<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Procedural Terrain · FPS Environment</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      letter-spacing: 1px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="info">PROCEDURAL TERRAIN · WASD + MOUSE</div>

  <!-- Import Three.js core and addons from CDN (no external models/textures) -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { ImprovedNoise } from 'three/addons/math/ImprovedNoise.js';

    // ----------------------------------------------
    // 1. Setup Scene, Camera, Renderer
    // ----------------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // sky blue
    scene.fog = new THREE.FogExp2(0x87CEEB, 0.0025); // atmospheric fog

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 600);
    camera.position.set(30, 25, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap; // softer shadows
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // ----------------------------------------------
    // 2. Controls (First-person with collision)
    // ----------------------------------------------
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.screenSpacePanning = true;
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.minDistance = 2;
    controls.maxDistance = 80;
    controls.target.set(0, 5, 0);
    controls.update();

    // ----------------------------------------------
    // 3. Lighting (Physically inspired)
    // ----------------------------------------------
    // Ambient fill
    const ambientLight = new THREE.AmbientLight(0x404060, 0.45);
    scene.add(ambientLight);

    // Main directional light (simulating sun)
    const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    sunLight.position.set(50, 80, 30);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 200;
    sunLight.shadow.camera.left = -80;
    sunLight.shadow.camera.right = 80;
    sunLight.shadow.camera.top = 80;
    sunLight.shadow.camera.bottom = -80;
    scene.add(sunLight);

    // Fill light from sky
    const fillLight = new THREE.DirectionalLight(0x88aaff, 0.5);
    fillLight.position.set(-40, 20, -30);
    scene.add(fillLight);

    // Hemisphere light for ground bounce
    const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x362d1e, 0.6);
    scene.add(hemiLight);

    // Volumetric-style light feeling via subtle spotlight
    const volLight = new THREE.SpotLight(0xffaa66, 0.3);
    volLight.position.set(30, 40, 20);
    volLight.angle = 0.8;
    volLight.penumbra = 0.5;
    volLight.decay = 1;
    volLight.distance = 150;
    scene.add(volLight);

    // ----------------------------------------------
    // 4. Procedural Terrain Generation
    // ----------------------------------------------
    const terrainWidth = 200;
    const terrainDepth = 200;
    const segments = 160; // high detail

    // Generate heightmap using ImprovedNoise (Perlin)
    const perlin = new ImprovedNoise();
    const heightMap = [];
    const scale = 0.035;
    const amplitude = 12;
    const detailScale = 0.12;
    const detailAmp = 3;

    for (let i = 0; i <= segments; i++) {
      heightMap[i] = [];
      for (let j = 0; j <= segments; j++) {
        const x = i / segments * terrainWidth - terrainWidth/2;
        const z = j / segments * terrainDepth - terrainDepth/2;
        // Multi-octave noise
        let y = perlin.noise(x * scale, z * scale, 0.5) * amplitude;
        y += perlin.noise(x * scale * 2.3, z * scale * 2.3, 1.2) * detailAmp;
        y += perlin.noise(x * scale * 5.0, z * scale * 5.0, 2.7) * 1.2;
        y += perlin.noise(x * scale * 12.0, z * scale * 12.0, 3.9) * 0.6;
        // Flatten edges slightly for natural blending
        const edgeFactor = 1 - Math.pow(Math.abs(x) / (terrainWidth/2), 6) * 0.3;
        y = y * edgeFactor;
        heightMap[i][j] = y;
      }
    }

    // Build geometry with vertex colors for dirt/grass blending
    const geometry = new THREE.BufferGeometry();
    const vertices = [];
    const colors = [];
    const indices = [];
    const normals = [];

    // Color palette
    const grassColor = new THREE.Color(0x5c8c4a);
    const darkGrass = new THREE.Color(0x3d6b2e);
    const dirtColor = new THREE.Color(0x7a5a3a);
    const rockColor = new THREE.Color(0x6a6a6a);

    // Helper to get height at grid coords
    function getHeight(i, j) {
      if (i < 0 || i > segments || j < 0 || j > segments) return 0;
      return heightMap[i][j];
    }

    // Generate vertices, colors, normals
    for (let i = 0; i <= segments; i++) {
      for (let j = 0; j <= segments; j++) {
        const x = i / segments * terrainWidth - terrainWidth/2;
        const z = j / segments * terrainDepth - terrainDepth/2;
        const y = heightMap[i][j];

        vertices.push(x, y, z);

        // Color based on height and slope
        const slope = calculateSlope(i, j);
        let color;
        if (y < -2) {
          // Low areas: dirt/rock mix
          color = dirtColor.clone().lerp(rockColor, 0.3);
        } else if (y < 1) {
          // Grass with variation
          const t = (y + 2) / 3;
          color = grassColor.clone().lerp(darkGrass, t * 0.5);
          // Add some noise variation
          const noiseVal = perlin.noise(x * 0.5, z * 0.5, 0.0) * 0.15 + 0.5;
          color.lerp(dirtColor, (1 - noiseVal) * 0.3);
        } else if (y < 4) {
          // Transition to rocky
          const t = (y - 1) / 3;
          color = grassColor.clone().lerp(rockColor, t * 0.7);
        } else {
          // Rocky peaks
          color = rockColor.clone();
          const highlight = perlin.noise(x * 0.2, z * 0.2, 0.0) * 0.2 + 0.8;
          color.multiplyScalar(highlight);
        }

        // Slope influence: more rock on steep slopes
        if (slope > 0.8) {
          color.lerp(rockColor, 0.6);
        } else if (slope > 0.4) {
          color.lerp(dirtColor, 0.3);
        }

        colors.push(color.r, color.g, color.b);
      }
    }

    // Indices for triangles
    for (let i = 0; i < segments; i++) {
      for (let j = 0; j < segments; j++) {
        const a = i * (segments + 1) + j;
        const b = i * (segments + 1) + j + 1;
        const c = (i + 1) * (segments + 1) + j;
        const d = (i + 1) * (segments + 1) + j + 1;

        indices.push(a, b, c);
        indices.push(b, d, c);
      }
    }

    // Compute normals
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    geometry.setIndex(indices);
    geometry.computeVertexNormals();

    // Terrain mesh
    const terrainMaterial = new THREE.MeshStandardMaterial({
      vertexColors: true,
      roughness: 0.85,
      metalness: 0.05,
      flatShading: false,
      side: THREE.DoubleSide,
      envMapIntensity: 0.2
    });

    const terrain = new THREE.Mesh(geometry, terrainMaterial);
    terrain.receiveShadow = true;
    terrain.castShadow = false;
    scene.add(terrain);

    // Helper slope calculation
    function calculateSlope(i, j) {
      const hL = getHeight(i-1, j);
      const hR = getHeight(i+1, j);
      const hD = getHeight(i, j-1);
      const hU = getHeight(i, j+1);
      const dx = (hR - hL) / 2;
      const dz = (hU - hD) / 2;
      return Math.sqrt(dx*dx + dz*dz);
    }

    // ----------------------------------------------
    // 5. Procedural Rocks (geometry based)
    // ----------------------------------------------
    function createRock(posX, posZ, size) {
      const i = Math.round((posX + terrainWidth/2) / terrainWidth * segments);
      const j = Math.round((posZ + terrainDepth/2) / terrainDepth * segments);
      if (i < 0 || i > segments || j < 0 || j > segments) return null;
      const yBase = heightMap[i][j] || 0;
      
      // Randomize rock shape using Dodecahedron with vertex displacement
      const geo = new THREE.DodecahedronGeometry(size * 0.6, 0);
      const pos = geo.attributes.position;
      for (let k = 0; k < pos.count; k++) {
        const x = pos.getX(k);
        const y = pos.getY(k);
        const z = pos.getZ(k);
        const len = Math.sqrt(x*x + y*y + z*z);
        const noiseVal = perlin.noise(x * 1.5 + 10, y * 1.5 + 20, z * 1.5 + 30) * 0.3 + 1;
        const scaleFactor = 1 + (noiseVal - 0.5) * 0.6;
        pos.setXYZ(k, x * scaleFactor, y * scaleFactor, z * scaleFactor);
      }
      geo.computeVertexNormals();

      const mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(0x6a6a6a).lerp(new THREE.Color(0x8a7a6a), Math.random() * 0.4),
        roughness: 0.9,
        metalness: 0.1,
        flatShading: true
      });
      const rock = new THREE.Mesh(geo, mat);
      rock.position.set(posX, yBase + size * 0.2, posZ);
      rock.scale.set(1, 0.7 + Math.random() * 0.5, 0.8 + Math.random() * 0.4);
      rock.rotation.set(Math.random() * 6, Math.random() * 6, Math.random() * 6);
      rock.castShadow = true;
      rock.receiveShadow = true;
      return rock;
    }

    // Place rocks with natural distribution
    for (let r = 0; r < 240; r++) {
      const x = (Math.random() - 0.5) * terrainWidth * 0.85;
      const z = (Math.random() - 0.5) * terrainDepth * 0.85;
      const i = Math.round((x + terrainWidth/2) / terrainWidth * segments);
      const j = Math.round((z + terrainDepth/2) / terrainDepth * segments);
      if (i < 2 || i > segments-2 || j < 2 || j > segments-2) continue;
      const h = heightMap[i][j] || 0;
      // Only place rocks on slopes or elevated areas
      const slope = calculateSlope(i, j);
      if (slope < 0.2 && h < 1) continue;
      if (Math.random() > 0.35) continue;
      const size = 0.4 + Math.random() * 1.2;
      const rock = createRock(x, z, size);
      if (rock) scene.add(rock);
    }

    // ----------------------------------------------
    // 6. Procedural Grass (instanced geometry)
    // ----------------------------------------------
    const grassGroup = new THREE.InstancedMesh(
      new THREE.CylinderGeometry(0.04, 0.08, 0.35, 3),
      new THREE.MeshStandardMaterial({ color: 0x4f8a3a, roughness: 0.9 }),
      3000
    );
    grassGroup.castShadow = true;
    grassGroup.receiveShadow = false;
    const dummy = new THREE.Object3D();
    let grassCount = 0;
    for (let g = 0; g < 6000; g++) {
      const x = (Math.random() - 0.5) * terrainWidth * 0.9;
      const z = (Math.random() - 0.5) * terrainDepth * 0.9;
      const i = Math.round((x + terrainWidth/2) / terrainWidth * segments);
      const j = Math.round((z + terrainDepth/2) / terrainDepth * segments);
      if (i < 1 || i > segments-1 || j < 1 || j > segments-1) continue;
      const h = heightMap[i][j] || 0;
      if (h < -0.5 || h > 4) continue;
      const slope = calculateSlope(i, j);
      if (slope > 0.7) continue;
      
      dummy.position.set(x, h + 0.1, z);
      dummy.rotation.y = Math.random() * 6.28;
      dummy.scale.set(0.7 + Math.random() * 0.8, 0.7 + Math.random() * 0.6, 0.7 + Math.random() * 0.8);
      dummy.updateMatrix();
      grassGroup.setMatrixAt(grassCount++, dummy.matrix);
      if (grassCount >= 3000) break;
    }
    grassGroup.count = grassCount;
    grassGroup.instanceMatrix.needsUpdate = true;
    scene.add(grassGroup);

    // ----------------------------------------------
    // 7. Sky / Atmosphere (procedural)
    // ----------------------------------------------
    // Sun sphere (glow)
    const sunSphere = new THREE.Mesh(
      new THREE.SphereGeometry(2, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xffeedd })
    );
    sunSphere.position.copy(sunLight.position).multiplyScalar(2.5);
    scene.add(sunSphere);

    // Volumetric-like haze using a large translucent sphere
    const haze = new THREE.Mesh(
      new THREE.SphereGeometry(180, 32, 16),
      new THREE.MeshBasicMaterial({
        color: 0xaaccff,
        transparent: true,
        opacity: 0.06,
        side: THREE.BackSide
      })
    );
    scene.add(haze);

    // Distant mountains (silhouette)
    const mountMat = new THREE.MeshStandardMaterial({
      color: 0x4a5a6a,
      roughness: 1,
      metalness: 0,
      emissive: new THREE.Color(0x1a2a3a),
      emissiveIntensity: 0.2
    });
    for (let m = 0; m < 12; m++) {
      const angle = (m / 12) * Math.PI * 2;
      const radius = 95 + Math.random() * 20;
      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;
      const height = 15 + Math.random() * 25;
      const mount = new THREE.Mesh(
        new THREE.ConeGeometry(8 + Math.random() * 12, height, 5 + Math.floor(Math.random() * 4)),
        mountMat
      );
      mount.position.set(x, -2, z);
      mount.rotation.y = Math.random() * 6;
      mount.rotation.x = 0.1;
      mount.castShadow = false;
      mount.receiveShadow = false;
      scene.add(mount);
    }

    // ----------------------------------------------
    // 8. Animation loop & LOD / culling
    // ----------------------------------------------
    // Simple LOD: adjust renderer pixel ratio based on performance
    let frameCount = 0;
    function animate() {
      requestAnimationFrame(animate);

      // Dynamic resolution scaling (simple)
      frameCount++;
      if (frameCount % 30 === 0) {
        const fps = 1 / (performance.now() - lastTime) * 1000;
        lastTime = performance.now();
        // If FPS drops, reduce pixel ratio
        if (fps < 45 && renderer.getPixelRatio() > 1.2) {
          renderer.setPixelRatio(Math.max(1, renderer.getPixelRatio() - 0.1));
        } else if (fps > 55 && renderer.getPixelRatio() < 2.0) {
          renderer.setPixelRatio(Math.min(2.0, renderer.getPixelRatio() + 0.05));
        }
      }

      controls.update();

      // Move sun light for subtle change (optional)
      // sunLight.position.x = 50 * Math.sin(Date.now() * 0.00005);

      renderer.render(scene, camera);
    }
    let lastTime = performance.now();
    animate();

    // ----------------------------------------------
    // 9. Resize handler
    // ----------------------------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ----------------------------------------------
    // 10. Simple collision detection (ground following)
    // ----------------------------------------------
    // We modify the controls target to follow terrain height
    // Using a raycast from camera position downward
    const raycaster = new THREE.Raycaster();
    const down = new THREE.Vector3(0, -1, 0);
    function updateCameraHeight() {
      const pos = camera.position;
      const origin = new THREE.Vector3(pos.x, 50, pos.z);
      raycaster.set(origin, down);
      const intersects = raycaster.intersectObject(terrain);
      if (intersects.length > 0) {
        const terrainY = intersects[0].point.y;
        if (pos.y < terrainY + 1.0) {
          pos.y = terrainY + 1.2;
          controls.target.y = terrainY + 1.0;
        }
      }
    }

    // Override controls update to include height check
    const originalUpdate = controls.update.bind(controls);
    controls.update = function() {
      updateCameraHeight();
      originalUpdate();
    };

    // Also clamp camera to terrain bounds
    console.log('Procedural terrain environment ready.');
  </script>
</body>
</html>
