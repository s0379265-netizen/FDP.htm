<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1">
  <title>مسابقه ماشین حرفه‌ای</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: #87ceeb;
      touch-action: none;
      font-family: 'Segoe UI', Arial, sans-serif;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      touch-action: none;
      width: 100%;
      height: 100%;
    }

    /* ===== LOGIN ===== */
    #login-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #1a1a3e, #0a0a1a);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      transition: opacity 0.8s ease;
    }

    #login-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #login-title {
      color: white;
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    #login-title span {
      color: #ff6b35;
      font-weight: 600;
    }

    #login-sub {
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    #login-box {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 50px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    #login-box input {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
      margin-bottom: 16px;
    }

    #login-box input:focus {
      border-color: #ff6b35;
    }

    #login-box input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    #login-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #ff6b35, #ff4500);
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #login-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 30px rgba(255, 107, 53, 0.3);
    }

    #login-btn:active {
      transform: scale(0.95);
    }

    #login-error {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
    }

    #online-count {
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
      margin-top: 16px;
    }

    /* ===== LOADING ===== */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #1a1a3e, #0a0a1a);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.8s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading-title {
      color: white;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    #loading-title span {
      color: #ff6b35;
      font-weight: 600;
    }

    #loading-sub {
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    .loader-container {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff6b35, #ff4500);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    #loading-percent {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      margin-top: 12px;
      font-family: monospace;
    }

    #loading-status {
      color: rgba(255, 255, 255, 0.3);
      font-size: 11px;
      margin-top: 6px;
      font-family: monospace;
    }

    /* ===== UI ===== */
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #info {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 15px;
      background: rgba(0, 0, 0, 0.5);
      padding: 6px 18px;
      border-radius: 30px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: none;
      text-align: center;
      letter-spacing: 1px;
      font-weight: 300;
      white-space: nowrap;
    }

    #info span {
      color: #ff6b35;
      font-weight: 600;
    }

    #speed-display {
      position: absolute;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 32px;
      font-weight: 700;
      font-family: monospace;
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 28px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: none;
      text-align: center;
    }

    #speed-display span {
      font-size: 16px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.4);
    }

    #player-name-display {
      position: absolute;
      top: 75px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 16px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    #online-count-display {
      position: absolute;
      top: 20px;
      right: 20px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 12px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    /* ===== فرمان دکمه‌ای ===== */
    #steering-container {
      position: fixed;
      bottom: 40px;
      left: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
      z-index: 20;
    }

    .steer-row {
      display: flex;
      gap: 12px;
    }

    .steer-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03));
      backdrop-filter: blur(15px);
      border: 2px solid rgba(255, 255, 255, 0.15);
      color: white;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      touch-action: none;
      pointer-events: auto;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.05s, border-color 0.1s;
    }

    .steer-btn:active {
      transform: scale(0.88);
      border-color: rgba(255, 107, 53, 0.4);
      background: radial-gradient(circle at 30% 30%, rgba(255, 107, 53, 0.25), rgba(255, 107, 53, 0.05));
    }

    .steer-btn.active {
      border-color: rgba(255, 107, 53, 0.4);
      background: radial-gradient(circle at 30% 30%, rgba(255, 107, 53, 0.2), rgba(255, 107, 53, 0.05));
    }

    .steer-label {
      color: rgba(255, 255, 255, 0.2);
      font-size: 10px;
      letter-spacing: 2px;
    }

    /* ===== گاز و ترمز ===== */
    #gas-container {
      position: fixed;
      bottom: 100px;
      right: 80px;
      width: 80px;
      height: 120px;
      pointer-events: auto;
      z-index: 20;
      touch-action: none;
    }

    #gas-pedal {
      width: 100%;
      height: 100%;
      border-radius: 20px;
      background: radial-gradient(circle at 30% 30%, rgba(76, 175, 80, 0.15), rgba(76, 175, 80, 0.03));
      backdrop-filter: blur(15px);
      border: 2px solid rgba(76, 175, 80, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      touch-action: none;
      transition: transform 0.03s, border-color 0.05s;
      color: rgba(255, 255, 255, 0.3);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    #gas-pedal.active {
      border-color: rgba(76, 175, 80, 0.6);
      background: radial-gradient(circle at 30% 30%, rgba(76, 175, 80, 0.3), rgba(76, 175, 80, 0.05));
      transform: scale(0.95);
    }

    #gas-pedal .icon {
      font-size: 28px;
      margin-bottom: 4px;
    }

    #brake-container {
      position: fixed;
      bottom: 100px;
      right: 20px;
      width: 50px;
      height: 80px;
      pointer-events: auto;
      z-index: 20;
      touch-action: none;
    }

    #brake-pedal {
      width: 100%;
      height: 100%;
      border-radius: 15px;
      background: radial-gradient(circle at 30% 30%, rgba(244, 67, 54, 0.15), rgba(244, 67, 54, 0.03));
      backdrop-filter: blur(15px);
      border: 2px solid rgba(244, 67, 54, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      touch-action: none;
      transition: transform 0.03s, border-color 0.05s;
      color: rgba(255, 255, 255, 0.3);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    #brake-pedal.active {
      border-color: rgba(244, 67, 54, 0.6);
      background: radial-gradient(circle at 30% 30%, rgba(244, 67, 54, 0.3), rgba(244, 67, 54, 0.05));
      transform: scale(0.95);
    }

    #extra-buttons {
      position: fixed;
      bottom: 220px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: auto;
      z-index: 20;
    }

    .extra-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
      backdrop-filter: blur(15px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      transition: transform 0.05s, background 0.05s, border-color 0.1s;
      touch-action: none;
      pointer-events: auto;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .extra-btn:active {
      transform: scale(0.85);
      background: radial-gradient(circle at 30% 30%, rgba(255, 107, 53, 0.2), rgba(255, 107, 53, 0.05));
      border-color: rgba(255, 107, 53, 0.3);
    }

    .extra-btn.active {
      border-color: rgba(255, 107, 53, 0.4);
      background: radial-gradient(circle at 30% 30%, rgba(255, 107, 53, 0.15), rgba(255, 107, 53, 0.03));
    }

    #controls-hint {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.15);
      font-size: 9px;
      background: rgba(0, 0, 0, 0.2);
      padding: 3px 12px;
      border-radius: 12px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.03);
      pointer-events: none;
      text-align: center;
      letter-spacing: 0.5px;
      white-space: nowrap;
      z-index: 5;
    }

    .player-label {
      color: white;
      font-size: 12px;
      font-weight: 600;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
      background: rgba(0, 0, 0, 0.6);
      padding: 2px 12px;
      border-radius: 12px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
      white-space: nowrap;
      transform: translateY(-30px);
    }

    .player-label.own {
      border-color: rgba(255, 107, 53, 0.4);
      color: #ff6b35;
    }

    @media (max-width: 600px) {
      .steer-btn {
        width: 55px;
        height: 55px;
        font-size: 22px;
      }
      #steering-container {
        bottom: 25px;
        left: 20px;
        gap: 6px;
      }
      .steer-row {
        gap: 8px;
      }
      #gas-container {
        width: 60px;
        height: 90px;
        bottom: 70px;
        right: 60px;
      }
      #brake-container {
        width: 40px;
        height: 60px;
        bottom: 70px;
        right: 15px;
      }
      #extra-buttons {
        bottom: 160px;
        right: 15px;
        gap: 8px;
      }
      .extra-btn {
        width: 40px;
        height: 40px;
        font-size: 14px;
      }
      #speed-display {
        font-size: 24px;
        padding: 6px 18px;
        bottom: 140px;
      }
      #info {
        font-size: 12px;
        padding: 4px 12px;
        top: 12px;
        white-space: normal;
      }
      #controls-hint {
        display: none;
      }
      #player-name-display {
        top: 55px;
        font-size: 10px;
        padding: 3px 12px;
      }
      #online-count-display {
        top: 12px;
        right: 12px;
        font-size: 10px;
        padding: 3px 10px;
      }
      .player-label {
        font-size: 10px;
        padding: 2px 8px;
        transform: translateY(-25px);
      }
      #gas-pedal {
        font-size: 11px;
      }
      #gas-pedal .icon {
        font-size: 22px;
      }
      #brake-pedal {
        font-size: 8px;
      }
    }

    @media (pointer: coarse) {
      #controls-hint {
        display: none;
      }
    }

    @media (max-height: 600px) {
      .steer-btn {
        width: 45px;
        height: 45px;
        font-size: 18px;
      }
      #steering-container {
        bottom: 15px;
        left: 15px;
        gap: 4px;
      }
      .steer-row {
        gap: 6px;
      }
      #gas-container {
        width: 50px;
        height: 75px;
        bottom: 50px;
        right: 50px;
      }
      #brake-container {
        width: 35px;
        height: 50px;
        bottom: 50px;
        right: 10px;
      }
      #extra-buttons {
        bottom: 130px;
        right: 10px;
        gap: 6px;
      }
      .extra-btn {
        width: 35px;
        height: 35px;
        font-size: 12px;
      }
      #speed-display {
        font-size: 20px;
        padding: 4px 14px;
        bottom: 110px;
      }
    }
  </style>
</head>

<body>

  <!-- ====== LOGIN ====== -->
  <div id="login-screen">
    <div id="login-title">🏎️ <span>مسابقه</span> ماشین</div>
    <div id="login-sub">به جاده سرعت خوش آمدید</div>
    <div id="login-box">
      <input type="text" id="name-input" placeholder="نام خود را وارد کنید..." maxlength="20" autofocus>
      <button id="login-btn">🔥 وارد جاده شو</button>
      <div id="login-error"></div>
      <div id="online-count">🔗 در حال اتصال به سرور...</div>
    </div>
  </div>

  <!-- ====== LOADING ====== -->
  <div id="loading-screen">
    <div id="loading-title">🏎️ <span>مسابقه</span></div>
    <div id="loading-sub">در حال آماده‌سازی جاده</div>
    <div class="loader-container">
      <div class="loader-bar" id="loader-bar"></div>
    </div>
    <div id="loading-percent">۰٪</div>
    <div id="loading-status">در حال بارگذاری...</div>
  </div>

  <!-- ====== UI ====== -->
  <div id="ui-overlay">
    <div id="info">🏎️ <span>مسابقه</span> · جاده سرعت</div>
    <div id="player-name-display">👤 شما</div>
    <div id="online-count-display">👥 ۰ آنلاین</div>
    <div id="speed-display">0 <span>km/h</span></div>

    <div id="steering-container">
      <div class="steer-row">
        <div class="steer-btn" id="steer-left-btn">◀</div>
        <div class="steer-btn" id="steer-right-btn">▶</div>
      </div>
      <div class="steer-label">فرمان</div>
    </div>

    <div id="gas-container">
      <div id="gas-pedal">
        <span class="icon">⏫</span>
        گاز
      </div>
    </div>

    <div id="brake-container">
      <div id="brake-pedal">
        ⏬
        ترمز
      </div>
    </div>

    <div id="extra-buttons">
      <div class="extra-btn" id="reverse-btn">↩️</div>
      <div class="extra-btn" id="handbrake-btn">🔄</div>
      <div class="extra-btn" id="reset-btn">⟳</div>
    </div>

    <div id="controls-hint">
      🖱️ ماوس چرخش دوربین
    </div>
  </div>

  <script src="https://cdn.ably.com/lib/ably.min-1.js">
  </script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ============================================
    // DOM ELEMENTS
    // ============================================
    const loginScreen = document.getElementById('login-screen');
    const loginBtn = document.getElementById('login-btn');
    const nameInput = document.getElementById('name-input');
    const loginError = document.getElementById('login-error');
    const onlineCountEl = document.getElementById('online-count');
    const onlineCountDisplay = document.getElementById('online-count-display');
    const playerNameDisplay = document.getElementById('player-name-display');
    const speedDisplay = document.getElementById('speed-display');

    const loadingScreen = document.getElementById('loading-screen');
    const loaderBar = document.getElementById('loader-bar');
    const loadingPercent = document.getElementById('loading-percent');
    const loadingStatus = document.getElementById('loading-status');

    // ============================================
    // ABLY SETUP
    // ============================================
    let ablyClient = null;
    let channel = null;
    let currentUserId = '';
    let playerName = '';
    let isConnected = false;
    let reconnectAttempts = 0;
    const MAX_RECONNECT = 20;
    const SEND_INTERVAL = 30;

    const players = new Map();

    function connectToAbly(name) {
      return new Promise((resolve, reject) => {
        try {
          const clientId = 'car_' + Math.random().toString(36).substr(2, 8);
          currentUserId = clientId;

          ablyClient = new Ably.Realtime({
            key: 'NNYzzQ.7HHPYg:NA1mSMcWdEnlWOHGZ4CaF7ZUkoXe1Iggtf0sy-nNsDM',
            clientId: clientId,
            echoMessages: false,
            autoConnect: true
          });

          ablyClient.connection.on('connected', () => {
            console.log('✅ متصل به Ably!');
            isConnected = true;
            reconnectAttempts = 0;
            onlineCountEl.textContent = '🔗 متصل به سرور';
            resolve();
          });

          ablyClient.connection.on('disconnected', () => {
            console.log('⚠️ قطع موقت');
            isConnected = false;
            onlineCountEl.textContent = '🔄 تلاش برای اتصال مجدد...';
            setTimeout(() => {
              if (ablyClient) {
                try {
                  ablyClient.connection.recover();
                } catch (e) {
                  ablyClient.connection.connect();
                }
              }
            }, 1000);
          });

          ablyClient.connection.on('failed', () => {
            console.log('❌ اتصال ناموفق');
            isConnected = false;
            if (reconnectAttempts < MAX_RECONNECT) {
              reconnectAttempts++;
              onlineCountEl.textContent = `🔄 تلاش مجدد ${reconnectAttempts}/${MAX_RECONNECT}...`;
              setTimeout(() => {
                if (ablyClient) {
                  try {
                    ablyClient.connection.recover();
                  } catch (e) {
                    ablyClient.connection.connect();
                  }
                }
              }, 2000);
            } else {
              reject(new Error('اتصال به سرور ناموفق'));
            }
          });

        } catch (error) {
          reject(error);
        }
      });
    }

    // ============================================
    // LOGIN
    // ============================================
    async function handleLogin() {
      const name = nameInput.value.trim();
      if (!name) {
        loginError.textContent = '⚠️ لطفاً نام خود را وارد کنید';
        return;
      }
      if (name.length < 2) {
        loginError.textContent = '⚠️ نام باید حداقل ۲ حرف باشد';
        return;
      }

      loginBtn.textContent = '⏳ در حال اتصال...';
      loginBtn.disabled = true;
      loginError.textContent = '';

      try {
        await connectToAbly(name);
        playerName = name;
        channel = ablyClient.channels.get('car-race');

        playerNameDisplay.textContent = `👤 ${playerName}`;

        loginScreen.classList.add('hidden');

        startGame();

      } catch (error) {
        loginError.textContent = '❌ ' + error.message;
        loginBtn.textContent = '🔥 وارد جاده شو';
        loginBtn.disabled = false;
      }
    }

      const tree = new THREE.Group();
      const trunkHeight = 2 + Math.random() * 2;
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.4, trunkHeight, 6),
        new THREE.MeshStandardMaterial({ color: 0x5b3718, roughness: 0.9 })
      );
      trunk.position.y = trunkHeight / 2;
      trunk.castShadow = true;
      tree.add(trunk);

        new THREE.ConeGeometry(leafSize, leafHeight, 6 + Math.floor(Math.random() * 4)),
        new THREE.MeshStandardMaterial({ color: leafColor, roughness: 0.8 })
      );
      leaf.position.y = trunkHeight + leafHeight / 2;
      leaf.castShadow = true;
      tree.add(leaf);

      tree.position.set(x, 0, z);
      return tree;

    // ============================================
    // NETWORK
    // ============================================
    function createRemoteCar(clientId, data) {
      if (clientId === currentUserId) return;
      if (players.has(clientId)) return;

      const group = new THREE.Group();
      const carColor = new THREE.Color().setHSL((parseInt(clientId.substr(-4), 36) % 360) / 360, 0.7, 0.5);
      const mat = new THREE.MeshStandardMaterial({
        color: carColor,
        roughness: 0.3,
        metalness: 0.5,
      });

      const body = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.35, 1.8), mat);
      body.position.y = 0.25;
      body.castShadow = true;
      group.add(body);

      const cabinMat2 = new THREE.MeshStandardMaterial({
        color: 0x222244,
        roughness: 0.1,
        metalness: 0.8,
        transparent: true,
        opacity: 0.5,
      });
      const cabin2 = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.25, 1.0), cabinMat2);
      cabin2.position.set(0, 0.45, -0.1);
      group.add(cabin2);

      const wheelMat2 = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
      const wPos = [
        [-0.5, 0.12, 0.65],
        [0.5, 0.12, 0.65],
        [-0.5, 0.12, -0.65],
        [0.5, 0.12, -0.65]
      ];
      for (const p of wPos) {
        const w = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.12, 8), wheelMat2);
        w.rotation.x = Math.PI / 2;
        w.position.set(p[0], p[1], p[2]);
        group.add(w);
      }

      const labelDiv2 = document.createElement('div');
      labelDiv2.className = 'player-label';
      labelDiv2.textContent = data.name || 'کاربر';
      const label2 = new CSS2DObject(labelDiv2);
      label2.position.set(0, 1.3, 0);
      group.add(label2);

      group.position.set(data.x || 0, 0.1, data.z || 0);
      group.rotation.y = data.rotation || 0;

      scene.add(group);

      players.set(clientId, {
        mesh: group,
        label: label2,
        data: data,
        name: data.name || 'کاربر',
        lastUpdate: Date.now()
      });

      updateOnlineCount();
    }

    function updateRemoteCar(clientId, data) {
      if (clientId === currentUserId) return;
      const player = players.get(clientId);
      if (!player) {
        createRemoteCar(clientId, data);
        return;
      }

      player.mesh.position.x = data.x || 0;
      player.mesh.position.z = data.z || 0;
      player.mesh.rotation.y = data.rotation || 0;

      if (player.label) {
        player.label.element.textContent = data.name || 'کاربر';
      }

      player.data = data;
      player.lastUpdate = Date.now();
    }

    function removeRemoteCar(clientId) {
      if (clientId === currentUserId) return;
      const player = players.get(clientId);
      if (player) {
        scene.remove(player.mesh);
        players.delete(clientId);
        updateOnlineCount();
      }
    }

    function updateOnlineCount() {
      const count = players.size + 1;
      onlineCountDisplay.textContent = `👥 ${count} آنلاین`;
    }

    // ============================================
    // NETWORK SEND/RECEIVE
    // ============================================
    let sendInterval = null;

    function startSendingPosition() {
      if (sendInterval) clearInterval(sendInterval);

      sendInterval = setInterval(() => {
        if (!isConnected || !channel) return;

        const pos = carGroup.position;
        const data = {
          x: pos.x,
          z: pos.z,
          rotation: carAngle,
          name: playerName,
          timestamp: Date.now()
        };

        try {
          channel.publish('car-update', {
            clientId: currentUserId,
            ...data
          });
        } catch (e) {}
      }, SEND_INTERVAL);
    }

    function setupChannelListener() {
      if (!channel) return;

      channel.subscribe('car-update', (message) => {
        const data = message.data;
        if (data.clientId === currentUserId) return;
        updateRemoteCar(data.clientId, data);
      });

      channel.presence.subscribe('enter', (presence) => {
        if (presence.clientId === currentUserId) return;
        if (presence.data) {
          createRemoteCar(presence.clientId, presence.data);
        }
      });

      channel.presence.subscribe('leave', (presence) => {
        removeRemoteCar(presence.clientId);
      });

      channel.presence.get((err, members) => {
        if (err) {
          console.error('خطا در دریافت اعضا:', err);
          return;
        }
        members.forEach((member) => {
          if (member.clientId !== currentUserId && member.data) {
            createRemoteCar(member.clientId, member.data);
          }
        });
        updateOnlineCount();
      });

      setTimeout(() => {
        if (channel) {
          channel.presence.enter({
            x: carGroup.position.x,
            z: carGroup.position.z,
            rotation: carAngle,
            name: playerName
          });
        }
      }, 500);
    }

    // ============================================
    // CONTROLS
    // ============================================
    let steerInput = 0;
    let gasInput = 0;
    let brakeInput = 0;
    let isBoosting = false;
    let isReversingBtn = false;
    let isHandBrakeBtn = false;

    // ---------- فرمان دکمه‌ای ----------
    const steerLeftBtn = document.getElementById('steer-left-btn');
    const steerRightBtn = document.getElementById('steer-right-btn');

    function setSteer(value) {
      steerInput = value;
      if (value === -1) {
        steerLeftBtn.classList.add('active');
        steerRightBtn.classList.remove('active');
      } else if (value === 1) {
        steerRightBtn.classList.add('active');
        steerLeftBtn.classList.remove('active');
      } else {
        steerLeftBtn.classList.remove('active');
        steerRightBtn.classList.remove('active');
      }
    }

    steerLeftBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      setSteer(-1);
    }, { passive: false });

    steerLeftBtn.addEventListener('touchend', () => setSteer(0), { passive: true });
    steerLeftBtn.addEventListener('touchcancel', () => setSteer(0), { passive: true });
    steerLeftBtn.addEventListener('mousedown', () => setSteer(-1));
    steerLeftBtn.addEventListener('mouseup', () => setSteer(0));
    steerLeftBtn.addEventListener('mouseleave', () => setSteer(0));

    steerRightBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      setSteer(1);
    }, { passive: false });

    steerRightBtn.addEventListener('touchend', () => setSteer(0), { passive: true });
    steerRightBtn.addEventListener('touchcancel', () => setSteer(0), { passive: true });
    steerRightBtn.addEventListener('mousedown', () => setSteer(1));
    steerRightBtn.addEventListener('mouseup', () => setSteer(0));
    steerRightBtn.addEventListener('mouseleave', () => setSteer(0));

    // ---------- گاز ----------
    const gasPedal = document.getElementById('gas-pedal');
    let gasTouchId = null;

      e.preventDefault();
      const touch = e.changedTouches[0];
      gasTouchId = touch.identifier;
      gasInput = 1;
      gasPedal.classList.add('active');
    }, { passive: false });

    document.addEventListener('touchend', (e) => {
      for (const touch of e.changedTouches) {
        if (touch.identifier === gasTouchId) {
          gasInput = 0;
          gasPedal.classList.remove('active');
          gasTouchId = null;
        }
      }
    }, { passive: true });

    document.addEventListener('touchcancel', () => {
      gasInput = 0;
      gasPedal.classList.remove('active');
      gasTouchId = null;
    }, { passive: true });

    gasPedal.addEventListener('mousedown', () => {
      gasInput = 1;
      gasPedal.classList.add('active');
    });

    document.addEventListener('mouseup', () => {
      gasInput = 0;
      gasPedal.classList.remove('active');

    // ---------- دکمه‌های اضافی ----------
    const reverseBtn = document.getElementById('reverse-btn');

    reverseBtn.addEventListener('touchstart', (e) => {

    // ============================================
    // KEYBOARD
    // ============================================
    const keys = { w: false, a: false, s: false, d: false };

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'w') { keys.w = true;
        gasInput = 1; }
      if (key === 's') { keys.s = true;
        brakeInput = 1; }
      if (key === 'a') { keys.a = true;
        setSteer(-1); }
      if (key === 'd') { keys.d = true;
        setSteer(1); }
    });

    document.addEventListener('keyup', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'w') { keys.w = false;
        gasInput = 0; }
      if (key === 's') { keys.s = false;
        brakeInput = 0; }
      if (key === 'a' && !keys.a) { setSteer(0); }
      if (key === 'd' && !keys.d) { setSteer(0); }
    });

    // ============================================
    // CAMERA (سریع‌تر)
    // ============================================
    let cameraAngle = 0;
    let cameraDistance = 10;
    let cameraHeight = 6;
    let targetCameraAngle = 0;
    let targetCameraHeight = 6;

    let isMouseDown = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    renderer.domElement.addEventListener('mousedown', (e) => {
      if (e.button === 0) {
        isMouseDown = true;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
      }
    });

    document.addEventListener('mouseup', () => { isMouseDown = false; });

    document.addEventListener('mousemove', (e) => {
      if (!isMouseDown) return;
      const dx = e.clientX - lastMouseX;
      const dy = e.clientY - lastMouseY;
      targetCameraAngle -= dx * 0.015;
      targetCameraHeight += dy * 0.08;
      targetCameraHeight = Math.max(4, Math.min(10, targetCameraHeight));
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
    });

    // Touch camera
    let touchCamId = null;
    let touchCamStartX = 0;
    let touchCamStartY = 0;

    renderer.domElement.addEventListener('touchstart', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      const touch = e.changedTouches[0];
      const x = touch.clientX - rect.left;
      const isRightSide = x > rect.width * 0.3 && x < rect.width * 0.7;

      if (e.touches.length === 1 && isRightSide) {
        touchCamId = touch.identifier;
        touchCamStartX = touch.clientX;
        touchCamStartY = touch.clientY;
      }
    }, { passive: true });

    renderer.domElement.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1) {
        for (const touch of e.changedTouches) {
          if (touch.identifier === touchCamId) {
            const dx = touch.clientX - touchCamStartX;
            const dy = touch.clientY - touchCamStartY;
            targetCameraAngle -= dx * 0.015;
            targetCameraHeight += dy * 0.08;
            targetCameraHeight = Math.max(4, Math.min(10, targetCameraHeight));
            touchCamStartX = touch.clientX;
            touchCamStartY = touch.clientY;
          }
        }
      }
    }, { passive: true });

    renderer.domElement.addEventListener('touchend', () => {
      touchCamId = null;
    }, { passive: true });

    // ============================================
    // GAME LOOP
    // ============================================
    const clock = new THREE.Clock();

    setInterval(() => {
      const now = Date.now();
      for (const [id, player] of players) {
        if (now - player.lastUpdate > 5000) {
          removeRemoteCar(id);
        }
      }
    }, 3000);

    function updateCar(delta) {
      let gas = gasInput;
      let brake = brakeInput;
      let steer = steerInput;

      if (isReversing) {
        gas = -0.5;
      }

      const currentMaxSpeed = isBoosting ? maxSpeed * 1.3 : maxSpeed;

      if (Math.abs(gas) > 0.05) {
        const accel = isBoosting ? acceleration * 1.3 : acceleration;
        carSpeed += gas * accel * delta;
        if (carSpeed > currentMaxSpeed) carSpeed = currentMaxSpeed;
        if (carSpeed < -currentMaxSpeed * 0.4) carSpeed = -currentMaxSpeed * 0.4;
      } else if (brake > 0.1) {
        carSpeed -= Math.sign(carSpeed) * braking * delta * 1.5;
        if (Math.abs(carSpeed) < 0.1) carSpeed = 0;
      } else if (isHandBrake) {
        carSpeed *= 0.95;
        if (Math.abs(carSpeed) < 0.1) carSpeed = 0;
      } else {
        if (Math.abs(carSpeed) > 0.1) {
          carSpeed -= Math.sign(carSpeed) * friction * delta;
        } else {
          carSpeed = 0;
        }
      }

      if (Math.abs(carSpeed) > 0.2 || isHandBrake) {
        const turnFactor = Math.min(Math.abs(carSpeed) / maxSpeed, 1);
        const handBrakeMultiplier = isHandBrake ? 1.5 : 1;
        carAngle += steer * turnSpeed * turnFactor * delta * handBrakeMultiplier;
      }

      const moveX = Math.sin(carAngle) * carSpeed * delta;
      const moveZ = Math.cos(carAngle) * carSpeed * delta;

      let newX = carGroup.position.x + moveX;
      let newZ = carGroup.position.z + moveZ;

      // محدودیت محیط (آزاد)
      const boundary = 280;
      if (Math.abs(newX) > boundary) newX = Math.sign(newX) * boundary;
      if (Math.abs(newZ) > boundary) newZ = Math.sign(newZ) * boundary;

      carGroup.position.x = newX;
      carGroup.position.z = newZ;
      carGroup.rotation.y = carAngle;

      const speedKmh = Math.round(Math.abs(carSpeed) * 8);
      speedDisplay.innerHTML = `${speedKmh} <span>km/h</span>`;

      const wheelRot = carSpeed * delta * 10;
      for (const wheel of wheels) {
        wheel.rotation.z += wheelRot;
      }

      label.position.set(0, 1.5, 0);
    }

    function updateCamera() {
      cameraAngle += (targetCameraAngle - cameraAngle) * 0.18;
      cameraHeight += (targetCameraHeight - cameraHeight) * 0.18;

      const speedFactor = Math.min(Math.abs(carSpeed) / maxSpeed, 1);
      const dynamicDistance = cameraDistance + speedFactor * 3;
      const dynamicHeight = cameraHeight + speedFactor * 1;

      const targetPos = carGroup.position.clone();
      targetPos.y += 0.5;

      const offsetX = Math.sin(cameraAngle) * dynamicDistance;
      const offsetZ = Math.cos(cameraAngle) * dynamicDistance;

      let camPos = new THREE.Vector3(
        targetPos.x + offsetX,
        targetPos.y + dynamicHeight,
        targetPos.z + offsetZ
      );

      camera.position.lerp(camPos, 0.18);
      camera.lookAt(targetPos);
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05);
      updateCar(delta);
      updateCamera();

      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    // ============================================
    // START GAME
    // ============================================
    function startGame() {
      updateLoading(50, 'بارگذاری ماشین...');
      setTimeout(() => {
        updateLoading(100, '✅ آماده!');
        setTimeout(hideLoading, 400);
      }, 500);

      setTimeout(() => {
        setupChannelListener();
      }, 1000);

      startSendingPosition();
      animate();

      setInterval(() => {
        if (!isConnected && ablyClient) {
          try {
            if (typeof ablyClient.connection.recover === 'function') {
              ablyClient.connection.recover();
            } else {
              ablyClient.connection.connect();
            }
          } catch (e) {
            try {
              ablyClient.connection.connect();
            } catch (e2) {}
          }
        }
      }, 3000);
    }

    // ============================================
    // RESIZE
    // ============================================
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      labelRenderer.setSize(innerWidth, innerHeight);
    });

    document.addEventListener('keydown', (e) => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
        e.preventDefault();
      }
    });

    console.log('🏎️ مسابقه ماشین حرفه‌ای!');
    console.log('✅ کیفیت حرفه‌ای با آنتی‌آلیاس');
    console.log('✅ جاده صاف و واقعی با خط‌کشی');
    console.log('✅ محیط آزاد - هر جا بری');
    console.log('✅ فرمان نرم و روان');
  </script>
</body>
