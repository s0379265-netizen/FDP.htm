<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🥊 Online Fist Fighting</title>
    <style>
        * { margin: 0; padding: 0; user-select: none; -webkit-touch-callout: none; }
        body {
            overflow: hidden;
            background: #0a0a12;
            font-family: 'Segoe UI', Arial, sans-serif;
            touch-action: none;
        }

        #team-select {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 30px;
        }
        #team-select h1 {
            color: white;
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 3px;
        }
        #team-select h1 span { color: #ffaa00; }
        .team-buttons {
            display: flex;
            gap: 50px;
        }
        .team-btn {
            width: 200px;
            height: 200px;
            border-radius: 30px;
            border: 4px solid rgba(255,255,255,0.2);
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
        }
        .team-btn:hover {
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.5);
        }
        .team-btn:active { transform: scale(0.95); }
        .team-btn.red { border-color: #ff3333; }
        .team-btn.red:hover { background: rgba(255,50,50,0.3); }
        .team-btn.blue { border-color: #3333ff; }
        .team-btn.blue:hover { background: rgba(50,50,255,0.3); }
        .team-btn .emoji { font-size: 60px; }

        #status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.9);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 10px 28px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 20;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }
        #status span { color: #6af; font-weight: bold; }

        #scoreboard {
            position: absolute;
            top: 80px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 20;
            min-width: 150px;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }
        #scoreboard .player-score {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        #scoreboard .player-score:last-child { border-bottom: none; }
        #scoreboard .red-team { color: #ff4444; }
        #scoreboard .blue-team { color: #4444ff; }

        #controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 30;
            pointer-events: none;
        }
        .ctrl-group {
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }
        .ctrl-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active, .ctrl-btn.active {
            background: rgba(102, 126, 234, 0.5);
            border-color: rgba(102, 126, 234, 0.8);
            transform: scale(0.90);
            box-shadow: 0 0 50px rgba(102, 126, 234, 0.4);
        }

        #punch-btn {
            position: absolute;
            bottom: 160px;
            right: 30px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid rgba(255,200,50,0.6);
            background: rgba(255,200,50,0.2);
            backdrop-filter: blur(12px);
            color: white;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 35;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 0 60px rgba(255,200,50,0.2);
            transition: all 0.1s;
            letter-spacing: 1px;
            gap: 4px;
        }
        #punch-btn:active {
            transform: scale(0.85);
            background: rgba(255,200,50,0.5);
            border-color: rgba(255,200,50,0.9);
            box-shadow: 0 0 80px rgba(255,200,50,0.5);
        }
        #punch-btn .icon { font-size: 32px; }

        #info-hint {
            position: absolute;
            bottom: 280px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            z-index: 15;
            text-align: center;
            pointer-events: none;
            background: rgba(0,0,0,0.3);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }

        #camera-control-area {
            position: fixed;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            z-index: 10;
            touch-action: none;
            cursor: grab;
        }
        #camera-control-area:active { cursor: grabbing; }

        /* Punch flash effect */
        #punch-flash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            background: radial-gradient(circle, rgba(255,200,50,0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.05s;
        }
        #punch-flash.active {
            opacity: 1;
        }

        @media (max-width: 500px) {
            .ctrl-btn { width: 60px; height: 60px; font-size: 24px; }
            #controls { padding: 0 15px; bottom: 25px; }
            .ctrl-group { gap: 12px; }
            #status { font-size: 12px; padding: 6px 16px; top: 12px; white-space: normal; }
            #info-hint { bottom: 230px; font-size: 11px; }
            #punch-btn { width: 75px; height: 75px; bottom: 130px; right: 20px; font-size: 12px; }
            #punch-btn .icon { font-size: 24px; }
            #team-select h1 { font-size: 28px; }
            .team-btn { width: 140px; height: 140px; font-size: 20px; }
            .team-btn .emoji { font-size: 40px; }
            .team-buttons { gap: 20px; }
            #scoreboard { font-size: 12px; padding: 10px 15px; top: 70px; right: 10px; min-width: 120px; }
        }
    </style>
</head>
<body>
    <!-- Team Selection -->
    <div id="team-select">
        <h1>⚔️ <span>CHOOSE</span> YOUR TEAM</h1>
        <div class="team-buttons">
            <button class="team-btn red" id="team-red">
                <span class="emoji">🔴</span>
                RED TEAM
                <span style="font-size:14px;opacity:0.6;">🔥 Attackers</span>
            </button>
            <button class="team-btn blue" id="team-blue">
                <span class="emoji">🔵</span>
                BLUE TEAM
                <span style="font-size:14px;opacity:0.6;">💪 Defenders</span>
            </button>
        </div>
        <div style="color:rgba(255,255,255,0.3);font-size:12px;margin-top:10px;">
            👥 Choose your side and fight!
        </div>
    </div>

    <div id="punch-flash"></div>

    <div id="status">🥊 <span>Waiting</span> | Online Fist Fight</div>
    <div id="scoreboard">
        <div style="font-weight:bold;margin-bottom:8px;color:#ffaa00;">🏆 SCOREBOARD</div>
        <div id="score-list"></div>
    </div>
    <div id="info-hint">⬆️⬇️⬅️➡️ Move | 👆 Rotate Camera | 👊 Punch!</div>

    <div id="camera-control-area"></div>

    <div id="controls">
        <div class="ctrl-group">
            <button class="ctrl-btn" id="btnLeft" aria-label="چپ">◀</button>
            <button class="ctrl-btn" id="btnRight" aria-label="راست">▶</button>
        </div>
        <div class="ctrl-group">
            <button class="ctrl-btn" id="btnForward" aria-label="جلو">▲</button>
            <button class="ctrl-btn" id="btnBack" aria-label="عقب">▼</button>
        </div>
    </div>

    <button id="punch-btn">
        <span class="icon">👊</span>
        PUNCH!
    </button>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ============================================================
        // ABLY CONNECTION
        // ============================================================
        const ably = new Ably.Realtime({
            key: 'NNYzzQ.7HHPYg:NA1mSMcWdEnlWOHGZ4CaF7ZUkoXe1Iggtf0sy-nNsDM',
            clientId: 'player_' + Math.random().toString(36).substr(2, 6)
        });

        let channel;
        let playerId = ably.clientId;
        let myTeam = null;
        let isConnected = false;

        // ============================================================
        // GAME STATE
        // ============================================================
        const MAX_HEALTH = 100;
        const PUNCH_DAMAGE = 15;
        const PUNCH_COOLDOWN = 300; // ms - faster for more action
        const PUNCH_RANGE = 2.0;
        const RESPAWN_DELAY = 2000;

        let lastPunchTime = 0;
        let isPunching = false;
        let punchSide = 'right';

        // ============================================================
        // THREE.JS SETUP
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 40);
        camera.position.set(0, 1.6, 3.0);

        const renderer = new THREE.WebGLRenderer({ 
            antialias: true,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.9;
        document.body.appendChild(renderer.domElement);

        // ============================================================
        // CAMERA CONTROL
        // ============================================================
        const cameraRadius = 3.0;
        const cameraHeight = 1.6;
        let cameraTheta = 0;
        let cameraPhi = 0.3;
        let targetCameraTheta = 0;
        let targetCameraPhi = 0.3;
        let playerTarget = new THREE.Vector3(0, 1.0, 0);

        const PHI_MIN = 0.1;
        const PHI_MAX = 0.8;

        function updateCamera() {
            cameraTheta += (targetCameraTheta - cameraTheta) * 0.15;
            cameraPhi += (targetCameraPhi - cameraPhi) * 0.15;
            cameraPhi = Math.max(PHI_MIN, Math.min(PHI_MAX, cameraPhi));
            
            const x = Math.sin(cameraTheta) * cameraRadius * Math.cos(cameraPhi);
            const y = Math.sin(cameraPhi) * cameraRadius + cameraHeight;
            const z = Math.cos(cameraTheta) * cameraRadius * Math.cos(cameraPhi);
            
            const targetPos = playerTarget.clone().add(new THREE.Vector3(x, y, z));
            
            camera.position.lerp(targetPos, 0.2);
            camera.lookAt(playerTarget);
        }

        // Camera controls
        const cameraControlArea = document.getElementById('camera-control-area');
        let isCameraDragging = false;
        let lastTouchX = 0, lastTouchY = 0, touchId = null;

        cameraControlArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            isCameraDragging = true;
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
            touchId = touch.identifier;
        }, { passive: false });

        cameraControlArea.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isCameraDragging) return;
            for (const touch of e.changedTouches) {
                if (touch.identifier === touchId) {
                    const deltaX = touch.clientX - lastTouchX;
                    const deltaY = touch.clientY - lastTouchY;
                    targetCameraTheta -= deltaX * 0.008;
                    targetCameraPhi += deltaY * 0.008;
                    targetCameraPhi = Math.max(PHI_MIN, Math.min(PHI_MAX, targetCameraPhi));
                    lastTouchX = touch.clientX;
                    lastTouchY = touch.clientY;
                    break;
                }
            }
        }, { passive: false });

        cameraControlArea.addEventListener('touchend', (e) => {
            for (const touch of e.changedTouches) {
                if (touch.identifier === touchId) {
                    isCameraDragging = false;
                    touchId = null;
                    break;
                }
            }
        }, { passive: true });

        let isMouseDragging = false;
        let lastMouseX = 0, lastMouseY = 0;

        cameraControlArea.addEventListener('mousedown', (e) => {
            isMouseDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            cameraControlArea.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isMouseDragging) return;
            const deltaX = e.clientX - lastMouseX;
            const deltaY = e.clientY - lastMouseY;
            targetCameraTheta -= deltaX * 0.006;
            targetCameraPhi += deltaY * 0.006;
            targetCameraPhi = Math.max(PHI_MIN, Math.min(PHI_MAX, targetCameraPhi));
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        window.addEventListener('mouseup', () => {
            isMouseDragging = false;
            cameraControlArea.style.cursor = 'grab';
        });

        // ============================================================
        // LIGHTING
        // ============================================================
        const ambient = new THREE.AmbientLight(0x445577, 0.5);
        scene.add(ambient);

        const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x3a3a5e, 0.6);
        scene.add(hemiLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.8);
        sunLight.position.set(6, 10, 5);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 512;
        sunLight.shadow.mapSize.height = 512;
        sunLight.shadow.bias = -0.001;
        const d2 = 12;
        sunLight.shadow.camera.left = -d2;
        sunLight.shadow.camera.right = d2;
        sunLight.shadow.camera.top = d2;
        sunLight.shadow.camera.bottom = -d2;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 20;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0x88bbff, 0.4);
        fillLight.position.set(-3, 2, -3);
        scene.add(fillLight);

        // ============================================================
        // GROUND
        // ============================================================
        const textureLoader = new THREE.TextureLoader();
        const groundTexture = textureLoader.load(
            "https://imglink.cc/cdn/synMTvB3HA.jpeg",
            () => console.log('✅ Ground loaded'),
            undefined,
            () => createFallbackGround()
        );

        groundTexture.wrapS = THREE.RepeatWrapping;
        groundTexture.wrapT = THREE.RepeatWrapping;
        groundTexture.repeat.set(20, 20);

        const groundMat = new THREE.MeshStandardMaterial({
            map: groundTexture,
            roughness: 0.8,
            metalness: 0.1,
            side: THREE.DoubleSide,
        });

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        ground.receiveShadow = true;
        scene.add(ground);

        function createFallbackGround() {
            const fallbackMat = new THREE.MeshStandardMaterial({
                color: 0x2a2a3e,
                roughness: 0.8,
                metalness: 0.1,
            });
            const fallback = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), fallbackMat);
            fallback.rotation.x = -Math.PI / 2;
            fallback.position.y = -0.01;
            fallback.receiveShadow = true;
            scene.add(fallback);
        }

        // ============================================================
        // OBSTACLES
        // ============================================================
        const obstacles = [];
        const wallMat = new THREE.MeshStandardMaterial({
            color: 0x334466,
            roughness: 0.5,
            metalness: 0.2,
            transparent: true,
            opacity: 0.1,
        });
        const wallPositions = [
            { x: 0, z: -11, w: 22, h: 3, d: 0.3 },
            { x: 0, z: 11, w: 22, h: 3, d: 0.3 },
            { x: -11, z: 0, w: 0.3, h: 3, d: 22 },
            { x: 11, z: 0, w: 0.3, h: 3, d: 22 },
        ];
        for (const w of wallPositions) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(w.w, w.h, w.d), wallMat);
            wall.position.set(w.x, w.h / 2, w.z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
            obstacles.push({
                type: 'box',
                pos: new THREE.Vector3(w.x, 0, w.z),
                size: new THREE.Vector3(w.w, w.h, w.d),
                rotY: 0,
            });
        }

        // ============================================================
        // PLAYER CREATION
        // ============================================================
        const characterLoader = new GLTFLoader();
        let myPlayer = null;
        let myMixer = null;
        let myIdleAction = null;
        let myWalkAction = null;
        let myRunAction = null;
        let myLoaded = false;
        let walkCycle = 0;
        let isMoving = false;
        let myHealth = MAX_HEALTH;
        let myScore = 0;
        let myKills = 0;
        let isRespawning = false;
        let respawnTimer = null;

        const moveState = { forward: false, back: false, left: false, right: false };
        const SPAWN_POINT = new THREE.Vector3(0, 0, 0);

        function findRightHandBone(model) {
            const possibleNames = [
                'RightHand', 'Hand_R', 'mixamorigRightHand', 'Bip01_R_Hand',
                'Right_Hand', 'hand_R', 'r_hand', 'right_hand'
            ];

            for (const name of possibleNames) {
                const bone = model.getObjectByName(name);
                if (bone && bone.isBone) return bone;
            }

            let found = null;
            model.traverse((child) => {
                if (child.isBone) {
                    const nameLower = child.name.toLowerCase();
                    if ((nameLower.includes('right') || nameLower.includes('r_')) && 
                        (nameLower.includes('hand') || nameLower.includes('wrist'))) {
                        if (!found) found = child;
                    }
                }
            });
            return found;
        }

        function findAnimation(animations, names) {
            for (const name of names) {
                for (const anim of animations) {
                    if (anim.name.toLowerCase().includes(name.toLowerCase())) {
                        return anim;
                    }
                }
            }
            return null;
        }

        function createPlayer(team, position) {
            return new Promise((resolve, reject) => {
                characterLoader.load(
                    "https://rawcdn.githack.com/mrdoob/three.js/r170/examples/models/gltf/Soldier.glb",
                    function(gltf) {
                        const player = gltf.scene;
                        player.scale.set(1, 1, 1);
                        player.position.copy(position || SPAWN_POINT);
                        player.castShadow = true;
                        player.receiveShadow = true;

                        // Only change the color slightly - keep soldier look
                        const color = team === 'red' ? 0xcc3333 : 0x3333cc;
                        player.traverse((child) => {
                            if (child.isMesh && child.material) {
                                if (Array.isArray(child.material)) {
                                    child.material.forEach(m => {
                                        // Slight color tint, not full color change
                                        const origColor = m.color.clone();
                                        m.color.setHex(color);
                                        // Mix with original to keep detail
                                        m.color.lerp(origColor, 0.3);
                                    });
                                } else {
                                    const origColor = child.material.color.clone();
                                    child.material.color.setHex(color);
                                    child.material.color.lerp(origColor, 0.3);
                                }
                            }
                        });

                        const mixer = new THREE.AnimationMixer(player);
                        let idleAction, walkAction, runAction, currentAction;

                        if (gltf.animations && gltf.animations.length > 0) {
                            const animations = gltf.animations;
                            const idleAnim = findAnimation(animations, ['idle', 'stand', 'wait']);
                            const walkAnim = findAnimation(animations, ['walk', 'forward']);
                            const runAnim = findAnimation(animations, ['run', 'sprint']);

                            if (idleAnim) {
                                idleAction = mixer.clipAction(idleAnim);
                                idleAction.play();
                                currentAction = idleAction;
                            } else if (animations.length > 0) {
                                idleAction = mixer.clipAction(animations[0]);
                                idleAction.play();
                                currentAction = idleAction;
                            }

                            if (walkAnim) walkAction = mixer.clipAction(walkAnim);
                            if (runAnim) runAction = mixer.clipAction(runAnim);
                            if (!walkAnim && runAnim) walkAction = mixer.clipAction(runAnim);
                        }

                        resolve({ player, mixer, idleAction, walkAction, runAction, currentAction });
                    },
                    undefined,
                    (error) => reject(error)
                );
            });
        }

        // ============================================================
        // ABLY MULTIPLAYER SYNC
        // ============================================================
        function connectToAbly() {
            ably.connection.on('connected', () => {
                console.log('✅ Connected to Ably');
                isConnected = true;
                channel = ably.channels.get('fist-fight-game');
                
                // Join the game
                channel.presence.enter({
                    clientId: playerId,
                    team: myTeam,
                    position: { x: 0, y: 0, z: 0 },
                    health: MAX_HEALTH,
                    score: 0,
                    kills: 0
                });

                // Listen for presence updates
                channel.presence.subscribe('enter', (presence) => {
                    const data = presence.data;
                    if (data.clientId !== playerId) {
                        console.log('👤 Player joined:', data.clientId);
                        spawnRemotePlayer(data.clientId, data.team, data.position);
                    }
                });

                channel.presence.subscribe('leave', (presence) => {
                    const data = presence.data;
                    if (data && data.clientId !== playerId) {
                        console.log('👋 Player left:', data.clientId);
                        removeRemotePlayer(data.clientId);
                    }
                });

                channel.presence.subscribe('update', (presence) => {
                    const data = presence.data;
                    if (data && data.clientId !== playerId) {
                        updateRemotePlayer(data.clientId, data);
                    }
                });

                // Listen for game events
                channel.subscribe('punch', (message) => {
                    const data = message.data;
                    if (data.playerId !== playerId) {
                        handleRemotePunch(data);
                    }
                });

                channel.subscribe('damage', (message) => {
                    const data = message.data;
                    if (data.targetId === playerId) {
                        handleRemoteDamage(data);
                    }
                });

                channel.subscribe('respawn', (message) => {
                    const data = message.data;
                    if (data.playerId === playerId) {
                        respawnMyPlayer();
                    }

                            }
                        });
                    }
                });

                document.getElementById('status').innerHTML = '🥊 <span>Online</span> | Team ' + 
                    (myTeam === 'red' ? '🔴 Red' : '🔵 Blue');

            ably.connection.on('disconnected', () => {
                console.warn('⚠️ Disconnected from Ably');
                isConnected = false;
                document.getElementById('status').innerHTML = '⚠️ <span>Disconnected</span>';
            });
        }

        function createHealthBar() {
            const group = new THREE.Group();
            
            const bg = new THREE.Mesh(
                new THREE.PlaneGeometry(0.6, 0.08),
                new THREE.MeshBasicMaterial({ color: 0x333333, transparent: true, opacity: 0.5 })
            );
            bg.position.y = 0.5;
            group.add(bg);
            
            const fill = new THREE.Mesh(
                new THREE.PlaneGeometry(0.58, 0.06),
                new THREE.MeshBasicMaterial({ color: 0x00ff00 })
            );
            fill.position.y = 0.5;
            fill.position.x = -0.01;
            group.add(fill);
            
            group.userData.healthFill = fill;
            group.userData.maxWidth = 0.58;
            
            return group;
        }

        function updateHealthBar(healthBar, health) {
            if (healthBar && healthBar.userData.healthFill) {
                const ratio = Math.max(0, health / MAX_HEALTH);
                const width = healthBar.userData.maxWidth * ratio;
                healthBar.userData.healthFill.scale.x = ratio;
                healthBar.userData.healthFill.position.x = -healthBar.userData.maxWidth / 2 + width / 2;
                
                const color = new THREE.Color();
                if (ratio > 0.6) color.setHex(0x00ff00);
                else if (ratio > 0.3) color.setHex(0xffff00);
                else color.setHex(0xff0000);
                healthBar.userData.healthFill.material.color.copy(color);
            }
        }

        function createNameTag(id, team) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            // Round rect function
            ctx.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                this.closePath();
                return this;
            };
            
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.roundRect(0, 0, 256, 64, 10);
            ctx.fill();
            
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = team === 'red' ? '#ff4444' : '#4444ff';
            ctx.fillText(id.substring(0, 10), 128, 32);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ 
                map: texture,
                transparent: true,
                depthTest: false
            });
            const sprite = new THREE.Sprite(material);
            sprite.position.y = 0.8;
            sprite.scale.set(0.8, 0.2, 1);
            
            return sprite;
        }

        function performPunch() {
            console.log('👊 Punch triggered!');
            
            if (!myPlayer || !myLoaded) {
                console.warn('⚠️ Player not ready!');
                return;
            }
            
            if (isRespawning) {
                console.warn('⚠️ Respawning!');
                return;
            }
            
            const now = Date.now();
            if (now - lastPunchTime < PUNCH_COOLDOWN) {
                console.log('⏳ Cooldown...');
                return;
            }
            
            console.log('💥 PUNCH!');
            lastPunchTime = now;
            isPunching = true;
            punchSide = punchSide === 'right' ? 'left' : 'right';
            
            // Play punch animation on arms
            animatePunch(myPlayer, punchSide);
            
            // Flash effect
            const flash = document.getElementById('punch-flash');
            flash.classList.add('active');
            setTimeout(() => flash.classList.remove('active'), 100);
            
            // Send punch event to server
            if (channel && isConnected) {
                channel.publish('punch', {
                    playerId: playerId,
                    position: myPlayer.position,
                    direction: getForwardDirection(),
                    side: punchSide,
                    timestamp: now
                });
            }
            
            // Check for nearby enemies
            checkPunchHit();
            
            // Reset punch state after animation
            setTimeout(() => {
                isPunching = false;
                resetArms(myPlayer);
            }, 250);
        }

        function animatePunch(player, side) {
            let armBone = null;
            let handBone = null;
            let forearmBone = null;
            
            player.traverse((child) => {
                if (child.isBone) {
                    const name = child.name.toLowerCase();
                    if (side === 'right') {
                        if (name.includes('rightarm') || name.includes('upperarm_r')) {
                            armBone = child;
                        }
                        if (name.includes('rightforearm') || name.includes('forearm_r')) {
                            forearmBone = child;
                        }
                        if (name.includes('righthand') || name.includes('hand_r')) {
                            handBone = child;
                        }
                    } else {
                        if (name.includes('leftarm') || name.includes('upperarm_l')) {
                            armBone = child;
                        }
                        if (name.includes('leftforearm') || name.includes('forearm_l')) {
                            forearmBone = child;
                        }
                        if (name.includes('lefthand') || name.includes('hand_l')) {
                            handBone = child;
                        }
                    }
                }
            });
            
            // Animate arm - punch forward
            if (armBone) {
                const origRot = armBone.rotation.x;
                const origZ = armBone.rotation.z;
                // Punch motion - arm goes forward and slightly up
                armBone.rotation.x = -1.5;
                armBone.rotation.z = side === 'right' ? -0.3 : 0.3;
                setTimeout(() => {
                    armBone.rotation.x = origRot;
                    armBone.rotation.z = origZ;
                }, 250);
            }
            
            if (forearmBone) {
                const origRot = forearmBone.rotation.x;
                forearmBone.rotation.x = -1.8;
                setTimeout(() => {
                    forearmBone.rotation.x = origRot;
                }, 250);
            }
            
            if (handBone) {
                const origPos = handBone.position.clone();
                handBone.position.x += 0.2;
                handBone.position.y += 0.05;
                setTimeout(() => {
                    handBone.position.copy(origPos);
                }, 250);
            }
        }

        function resetArms(player) {
            player.traverse((child) => {
                if (child.isBone) {
                    const name = child.name.toLowerCase();
                    if (name.includes('upperarm')) {
                        child.rotation.x = -0.8;
                        child.rotation.z = 0;
                    }
                    if (name.includes('forearm')) {
                        child.rotation.x = -0.3;
                    }
                    if (name.includes('hand')) {
                        child.position.x = 0;
                        child.position.y = 0;
                    }
                }
            });
        }

        function getForwardDirection() {
            const dir = new THREE.Vector3(0, 0, -1);

        function checkPunchHit() {
            if (!myPlayer) return;
            
            const punchPos = myPlayer.position.clone();
            punchPos.y += 0.8; // Punch at chest height
            
            // Check all remote players
            for (const [id, remote] of Object.entries(remotePlayers)) {
                if (!remote.player) continue;
                
                const dist = punchPos.distanceTo(remote.player.position);
                if (dist < PUNCH_RANGE) {

                    dealDamage(id);
                }
            }
        }

        function dealDamage(targetId) {
            if (remotePlayers[targetId]) {

                target.health -= PUNCH_DAMAGE;
                
                // Create hit effect

                // Update health bar

                // Send damage to server

                    channel.publish('damage', {
                        targetId: targetId,
                        damage: PUNCH_DAMAGE,
                        health: target.health,
                        attackerId: playerId

                // Check if defeated

                        if (channel && isConnected) {
                            channel.publish('respawn', {
                                playerId: targetId
                            });
                        }
                    }, RESPAWN_DELAY);
                }
            }
        }

        function createHitEffect(position) {
            const particles = new THREE.BufferGeometry();
            const count = 25;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const velocities = [];
            
            for (let i = 0; i < count; i++) {
                positions[i*3] = position.x + (Math.random() - 0.5) * 0.4;
                positions[i*3+1] = position.y + (Math.random() - 0.5) * 0.4;
                positions[i*3+2] = position.z + (Math.random() - 0.5) * 0.4;
                
                colors[i*3] = 1;
                colors[i*3+1] = 0.8 + Math.random() * 0.2;
                colors[i*3+2] = 0;
                
                velocities.push({
                    x: (Math.random() - 0.5) * 3,
                    y: Math.random() * 3 + 1,
                    z: (Math.random() - 0.5) * 3
                });
            }
            
            particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.12,
                vertexColors: true,
                transparent: true,
                opacity: 1,
                blending: THREE.AdditiveBlending
            });
            
            const particleSystem = new THREE.Points(particles, material);
            scene.add(particleSystem);
            
            let life = 1;
            const interval = setInterval(() => {
                life -= 0.025;
                const pos = particleSystem.geometry.attributes.position.array;
                for (let i = 0; i < count; i++) {
                    pos[i*3] += velocities[i].x * 0.025;
                    pos[i*3+1] += velocities[i].y * 0.025;
                    pos[i*3+2] += velocities[i].z * 0.025;
                    velocities[i].y -= 0.08;
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
                particleSystem.material.opacity = life;
                
                if (life <= 0) {
                    clearInterval(interval);
                    scene.remove(particleSystem);
                }
            }, 16);
        }

        // ============================================================
        // MOVEMENT SYSTEM
        // ============================================================
        let velocity = new THREE.Vector3(0, 0, 0);
        const maxSpeed = 4.0;
        const acceleration = 10;
        const deceleration = 8;

        function updateMovement(delta) {
            if (!myPlayer || !myLoaded || isRespawning) return;

            const rotSpeed = 3.0;
            let moving = false;
            let isRunning = false;

            if (moveState.left || moveState.right || moveState.forward || moveState.back) {
                moving = true;
            }
            if (moveState.forward && (moveState.left || moveState.right)) {
                isRunning = true;
            }

            if (moveState.left) {
                myPlayer.rotation.y += delta * rotSpeed;
            }
            if (moveState.right) {
                myPlayer.rotation.y -= delta * rotSpeed;
            }

            const dir = new THREE.Vector3(0, 0, -1);
            dir.applyQuaternion(myPlayer.quaternion);

            const targetSpeed = moving ? (isRunning ? maxSpeed * 1.4 : maxSpeed) : 0;
            const currentSpeed = velocity.length();
            
            if (moving) {
                const accel = acceleration * delta;
                velocity.x += dir.x * accel;
                velocity.z += dir.z * accel;
                const newSpeed = Math.min(velocity.length(), targetSpeed);
                velocity.normalize().multiplyScalar(newSpeed);
            } else {
                const decel = deceleration * delta;
                const newSpeed = Math.max(0, currentSpeed - decel);
                if (newSpeed < 0.01) {
                    velocity.set(0, 0, 0);
                } else {
                    velocity.normalize().multiplyScalar(newSpeed);
                }
            }

            const newPos = myPlayer.position.clone();
            newPos.x += velocity.x * delta;
            newPos.z += velocity.z * delta;

            if (!checkCollision(newPos)) {
                myPlayer.position.x = newPos.x;
                myPlayer.position.z = newPos.z;
            } else {
                velocity.set(0, 0, 0);
            }

            // Update animation
            if (myMixer) {
                myMixer.update(delta);

                let action = myIdleAction;
                if (moving) {
                    action = isRunning && myRunAction ? myRunAction : 
                            myWalkAction ? myWalkAction : myRunAction;
                }
                
                if (myIdleAction && !moving) {
                    action = myIdleAction;
                }
                
                if (action && myMixer) {
                    if (myMixer.currentAction !== action) {
                        if (myMixer.currentAction) myMixer.currentAction.fadeOut(0.1);
                        action.reset().fadeIn(0.1).play();
                        myMixer.currentAction = action;
                    }
                }
            }

            if (moving && velocity.length() > 0.5) {
                walkCycle += delta * 5;
                const swing = Math.sin(walkCycle) * 0.015;
                myPlayer.rotation.z = swing;
                myPlayer.position.y = Math.abs(Math.sin(walkCycle * 0.5)) * 0.005;
                isMoving = true;
            } else {
                if (isMoving) {
                    myPlayer.rotation.z = 0;
                    myPlayer.position.y = 0;
                    isMoving = false;
                }
            }

            if (myPlayer) {
                playerTarget.copy(myPlayer.position);
                playerTarget.y += 1.0;
            }

            // Send position update to server
            if (channel && isConnected && myPlayer && !isRespawning) {
                channel.presence.update({
                    clientId: playerId,
                    team: myTeam,
                    position: myPlayer.position,
                    health: myHealth,
                    score: myScore,
                    kills: myKills
                });
            }
        }

        function checkCollision(newPos) {
            const playerPos = new THREE.Vector3(newPos.x, 0, newPos.z);
            const PLAYER_RADIUS = 0.35;

            for (const obs of obstacles) {
                if (obs.type === 'box') {
                    const half = obs.size.clone().multiplyScalar(0.5);
                    const obsPos = obs.pos.clone();
                    const dx = Math.abs(playerPos.x - obsPos.x);
                    const dz = Math.abs(playerPos.z - obsPos.z);
                    if (dx < half.x + PLAYER_RADIUS && dz < half.z + PLAYER_RADIUS) {
                        return true;
                    }
                }
            }

            const limit = 10.5;
            if (Math.abs(newPos.x) > limit || Math.abs(newPos.z) > limit) {
                return true;
            }

            return false;
        }

        // ============================================================
        // HEALTH BAR UPDATE
        // ============================================================
        function updateMyHealthBar() {
            if (myPlayer && myPlayer.userData.healthBar) {
                const ratio = Math.max(0, myHealth / MAX_HEALTH);
                const fill = myPlayer.userData.healthBar.userData.healthFill;
                if (fill) {
                    const maxWidth = myPlayer.userData.healthBar.userData.maxWidth;
                    fill.scale.x = ratio;
                    fill.position.x = -maxWidth / 2 + (maxWidth * ratio) / 2;
                    
                    const color = new THREE.Color();
                    if (ratio > 0.6) color.setHex(0x00ff00);
                    else if (ratio > 0.3) color.setHex(0xffff00);
                    else color.setHex(0xff0000);
                    fill.material.color.copy(color);
                }
            }
        }

        // ============================================================

        function animate() {
            const delta = Math.min(clock.getDelta(), 0.05);
            updateMovement(delta);
            updateCamera();

            for (const [id, remote] of Object.entries(remotePlayers)) {
                if (remote.mixer) {
                    remote.mixer.update(delta);
                }
            }

            renderer.render(scene, camera);
            requestAnimationFrame(animate);

        document.addEventListener('touchmove', (e) => {
            if (e.target.closest('#controls') || e.target.closest('#punch-btn')) {
                e.preventDefault();
            }
        }, { passive: false });

        console.log('🥊 Online Fist Fighting Game Started!');
        console.log(`👤 Player ID: ${playerId}`);
        console.log('📡 Waiting for team selection...');
        console.log('💡 Press SPACE or click PUNCH to fight!');
    </script>
</body>
</html>
