<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>نقشه جنگی صنعتی - آنلاین</title>
    <style>
        * { margin: 0; padding: 0; user-select: none; -webkit-touch-callout: none; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #0a0a12;
            font-family: 'Segoe UI', Arial, sans-serif;
            touch-action: none;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* ===== LOGIN ===== */
        #login-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #1a1a3e, #0a0a1a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.8s ease;
        }
        #login-screen.hidden { opacity: 0; pointer-events: none; }
        #login-title { color: white; font-size: 32px; font-weight: 300; letter-spacing: 4px; margin-bottom: 8px; }
        #login-title span { color: #ff6b35; font-weight: 600; }
        #login-sub { color: rgba(255,255,255,0.4); font-size: 14px; letter-spacing: 2px; margin-bottom: 30px; }
        #login-box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px 50px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        #login-box input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 16px;
        }
        #login-box input:focus { border-color: #ff6b35; }
        #login-box input::placeholder { color: rgba(255,255,255,0.3); }
        #login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #ff6b35, #ff4500);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #login-btn:hover { transform: scale(1.02); }
        #login-btn:active { transform: scale(0.95); }
        #login-error { color: #ff6b6b; font-size: 13px; margin-top: 12px; min-height: 20px; }
        #online-count { color: rgba(255,255,255,0.3); font-size: 12px; margin-top: 16px; }

        #status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.9);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 10px 28px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 20;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }
        #status span { color: #6af; font-weight: bold; }

        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a1a;
            color: #6af;
            font-size: 20px;
            z-index: 100;
            font-weight: 300;
            letter-spacing: 2px;
            transition: opacity 0.8s;
            flex-direction: column;
            gap: 20px;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102,170,255,0.1);
            border-top: 3px solid #6af;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 30;
            pointer-events: none;
        }
        .ctrl-group { display: flex; gap: 20px; pointer-events: auto; }
        .ctrl-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active, .ctrl-btn.active {
            background: rgba(102,126,234,0.5);
            border-color: rgba(102,126,234,0.8);
            transform: scale(0.90);
            box-shadow: 0 0 50px rgba(102,126,234,0.4);
        }

        #info-hint {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            z-index: 15;
            text-align: center;
            pointer-events: none;
            background: rgba(0,0,0,0.3);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }

        #action-buttons {
            position: absolute;
            bottom: 160px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 35;
            pointer-events: none;
        }
        .action-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255,50,50,0.5);
            background: rgba(255,50,50,0.2);
            backdrop-filter: blur(12px);
            color: white;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 35;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 0 40px rgba(255,50,50,0.2);
            transition: all 0.1s;
            pointer-events: auto;
        }
        .action-btn:active {
            transform: scale(0.85);
            background: rgba(255,50,50,0.5);
            border-color: rgba(255,50,50,0.9);
            box-shadow: 0 0 60px rgba(255,50,50,0.5);
        }
        #punch-btn { font-size: 32px; }

        #camera-control-area {
            position: fixed;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            z-index: 10;
            touch-action: none;
            cursor: grab;
        }
        #camera-control-area:active { cursor: grabbing; }

        #debug-info {
            position: absolute;
            bottom: 220px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffaa00;
            background: rgba(0,0,0,0.9);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 25;
            text-align: center;
            border: 2px solid #ffaa00;
            pointer-events: none;
            max-width: 90%;
            font-weight: bold;
            transition: all 0.3s;
        }
        #debug-info.success { border-color: #00ff00; color: #00ff00; }
        #debug-info.error { border-color: #ff0000; color: #ff0000; }

        #player-name-display {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 4px 16px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 15;
        }

        #online-count-display {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 15;
        }

        /* ===== PING DISPLAY ===== */
        #ping-display {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 4px 14px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            pointer-events: none;
            z-index: 15;
        }
        #ping-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: background-color 0.3s;
        }
        #ping-text {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 600;
            font-family: monospace;
        }
        #ping-label {
            color: rgba(255,255,255,0.3);
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* ===== STATS DISPLAY ===== */
        #stats-display {
            position: absolute;
            top: 75px;
            left: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 8px 14px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            pointer-events: none;
            z-index: 15;
            line-height: 1.8;
        }
        #stats-display .stat { display: flex; justify-content: space-between; gap: 15px; }
        #stats-display .stat-label { color: rgba(255,255,255,0.3); }
        #stats-display .stat-value { color: #64ffda; font-weight: 600; }
        #stats-display .stat-value.kills { color: #ff6b35; }
        #stats-display .stat-value.deaths { color: #ff4444; }
        #stats-display .stat-value.kd { color: #ffd700; }

        .player-label {
            color: white;
            font-size: 12px;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(0,0,0,0.9);
            background: rgba(0,0,0,0.6);
            padding: 2px 12px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
            white-space: nowrap;
            transform: translateY(-35px);
        }
        .player-label.own {
            border-color: rgba(255,107,53,0.4);
            color: #ff6b35;
        }

        @media (max-width: 600px) {
            .ctrl-btn { width: 60px; height: 60px; font-size: 24px; }
            #controls { padding: 0 15px; bottom: 25px; }
            .ctrl-group { gap: 12px; }
            #status { font-size: 12px; padding: 6px 16px; top: 12px; white-space: normal; }
            #info-hint { bottom: 110px; font-size: 11px; }
            #action-buttons { bottom: 130px; right: 20px; gap: 10px; }
            .action-btn { width: 65px; height: 65px; font-size: 26px; }
            #punch-btn { font-size: 26px; }
            #debug-info { font-size: 12px; padding: 8px 16px; bottom: 190px; }
            #login-box { padding: 30px 25px; }
            #login-title { font-size: 24px; }
            #ping-display { top: 12px; left: 12px; padding: 3px 10px; }
            #ping-text { font-size: 11px; }
            #ping-dot { width: 8px; height: 8px; }
            #stats-display { top: 60px; left: 12px; font-size: 10px; padding: 6px 10px; }
            #player-name-display { top: 55px; font-size: 10px; padding: 3px 12px; }
            #online-count-display { top: 12px; right: 12px; font-size: 10px; padding: 3px 10px; }
            .player-label { font-size: 10px; padding: 2px 8px; transform: translateY(-25px); }
        }
    </style>
</head>
<body>

    <!-- ===== LOGIN ===== -->
    <div id="login-screen">
        <div id="login-title">🥊 <span>مبارزه</span> آنلاین</div>
        <div id="login-sub">به نقشه جنگی خوش آمدید</div>
        <div id="login-box">
            <input type="text" id="name-input" placeholder="نام خود را وارد کنید..." maxlength="20" autofocus>
            <button id="login-btn">🔥 وارد مبارزه شو</button>
            <div id="login-error"></div>
            <div id="online-count">🔗 در حال اتصال به سرور...</div>
        </div>
    </div>

    <div id="loading">
        <div class="loader-spinner"></div>
        <span>⏳ بارگذاری نقشه...</span>
    </div>

    <div id="status">🎮 <span>آماده</span> | نقشه جنگی</div>
    <div id="player-name-display">👤 شما</div>
    <div id="online-count-display">👥 ۰ آنلاین</div>
    
    <!-- PING DISPLAY -->
    <div id="ping-display">
        <div id="ping-dot" style="background-color: #4caf50;"></div>
        <span id="ping-label">PING</span>
        <span id="ping-text">0ms</span>
    </div>

    <!-- STATS DISPLAY -->
    <div id="stats-display">
        <div class="stat"><span class="stat-label">Kills</span><span class="stat-value kills" id="kills-display">0</span></div>
        <div class="stat"><span class="stat-label">Deaths</span><span class="stat-value deaths" id="deaths-display">0</span></div>
        <div class="stat"><span class="stat-label">K/D</span><span class="stat-value kd" id="kd-display">0.00</span></div>
        <div class="stat"><span class="stat-label">Hits</span><span class="stat-value" id="hits-display" style="color:#64ffda;">0</span></div>
    </div>

    <div id="info-hint">⬆️⬇️⬅️➡️ حرکت | 👆 چرخش دوربین | 👊 مشت</div>
    <div id="debug-info">⏳ در حال بارگذاری...</div>

    <div id="camera-control-area"></div>

    <div id="controls">
        <div class="ctrl-group">
            <button class="ctrl-btn" id="btnLeft">◀</button>
            <button class="ctrl-btn" id="btnRight">▶</button>
        </div>
        <div class="ctrl-group">
            <button class="ctrl-btn" id="btnForward">▲</button>
            <button class="ctrl-btn" id="btnBack">▼</button>
        </div>
    </div>

    <div id="action-buttons">
        <button class="action-btn" id="punch-btn">👊</button>
    </div>

    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ============================================================
        // 1. DOM ELEMENTS
        // ============================================================
        const loginScreen = document.getElementById('login-screen');
        const loginBtn = document.getElementById('login-btn');
        const nameInput = document.getElementById('name-input');
        const loginError = document.getElementById('login-error');
        const onlineCountEl = document.getElementById('online-count');
        const onlineCountDisplay = document.getElementById('online-count-display');
        const playerNameDisplay = document.getElementById('player-name-display');
        const debugEl = document.getElementById('debug-info');
        const pingText = document.getElementById('ping-text');
        const pingDot = document.getElementById('ping-dot');
        const killsDisplay = document.getElementById('kills-display');
        const deathsDisplay = document.getElementById('deaths-display');
        const kdDisplay = document.getElementById('kd-display');
        const hitsDisplay = document.getElementById('hits-display');

        // ============================================================
        // 2. STATS
        // ============================================================
        let stats = {
            kills: 0,
            deaths: 0,
            hits: 0,
            get kd() { return this.deaths === 0 ? this.kills : (this.kills / this.deaths); }
        };

        function updateStats() {
            killsDisplay.textContent = stats.kills;
            deathsDisplay.textContent = stats.deaths;
            kdDisplay.textContent = stats.kd.toFixed(2);
            hitsDisplay.textContent = stats.hits;
        }

        // ============================================================
        // 3. ABLY SETUP
        // ============================================================
        let ablyClient = null;
        let channel = null;
        let currentUserId = '';
        let playerName = '';
        let isConnected = false;
        let reconnectAttempts = 0;
        const MAX_RECONNECT = 20;
        const SEND_INTERVAL = 30;
        let pingHistory = [];
        let lastPingTime = 0;
        let isFirstPing = true;

        const players = new Map();

        function connectToAbly(name) {
            return new Promise((resolve, reject) => {
                try {
                    const clientId = 'user_' + Math.random().toString(36).substr(2, 8);
                    currentUserId = clientId;

                    ablyClient = new Ably.Realtime({
                        key: 'NNYzzQ.7HHPYg:NA1mSMcWdEnlWOHGZ4CaF7ZUkoXe1Iggtf0sy-nNsDM',
                        clientId: clientId,
                        echoMessages: false,
                        autoConnect: true
                    });

                    ablyClient.connection.on('connected', () => {
                        console.log('✅ متصل به Ably!');
                        isConnected = true;
                        reconnectAttempts = 0;
                        onlineCountEl.textContent = '🔗 متصل به سرور';
                        resolve();
                    });

                    ablyClient.connection.on('disconnected', () => {
                        console.log('⚠️ قطع موقت');
                        isConnected = false;
                        onlineCountEl.textContent = '🔄 تلاش برای اتصال مجدد...';
                        setTimeout(() => {
                            if (ablyClient) {
                                try { ablyClient.connection.recover(); } catch (e) { ablyClient.connection
                                        .connect(); }
                            }
                        }, 1000);
                    });

                    ablyClient.connection.on('failed', () => {
                        console.log('❌ اتصال ناموفق');
                        isConnected = false;
                        if (reconnectAttempts < MAX_RECONNECT) {
                            reconnectAttempts++;
                            onlineCountEl.textContent = `🔄 تلاش مجدد ${reconnectAttempts}/${MAX_RECONNECT}...`;
                            setTimeout(() => {
                                if (ablyClient) {
                                    try { ablyClient.connection.recover(); } catch (e) { ablyClient.connection
                                            .connect(); }
                                }
                            }, 2000);
                        } else {
                            reject(new Error('اتصال به سرور ناموفق'));
                        }
                    });

                } catch (error) {
                    reject(error);
                }
            });
        }

        // ============================================================
        // 4. PING SYSTEM
        // ============================================================
        function updatePing(pingMs) {
            pingHistory.push(pingMs);
            if (pingHistory.length > 10) pingHistory.shift();

            const avgPing = pingHistory.reduce((a, b) => a + b, 0) / pingHistory.length;
            const displayPing = Math.round(avgPing);

            pingText.textContent = displayPing + 'ms';

            // رنگ‌بندی مثل کالاف
            if (displayPing < 40) {
                pingDot.style.backgroundColor = '#4caf50'; // سبز - عالی
            } else if (displayPing < 80) {
                pingDot.style.backgroundColor = '#8bc34a'; // سبز روشن - خوب
            } else if (displayPing < 120) {
                pingDot.style.backgroundColor = '#ffeb3b'; // زرد - متوسط
            } else if (displayPing < 180) {
                pingDot.style.backgroundColor = '#ff9800'; // نارنجی - ضعیف
            } else {
                pingDot.style.backgroundColor = '#f44336'; // قرمز - بد
                debugEl.textContent = '⚠️ اتصال ضعیف!';
                debugEl.className = 'error';
                setTimeout(() => {
                    debugEl.textContent = '✅ آماده مبارزه';
                    debugEl.className = '';
                }, 2000);
            }
        }

        function measurePing() {
            if (!isConnected || !channel) return;

            const startTime = Date.now();
            const pingId = 'ping_' + startTime;

            try {
                channel.publish('ping', {
                    id: pingId,
                    time: startTime,
                    clientId: currentUserId
                }, (err) => {
                    if (err) return;
                });

                const handler = (message) => {
                    if (message.data && message.data.id === pingId && message.data.clientId !== currentUserId) {
                        const endTime = Date.now();
                        const pingMs = endTime - startTime;
                        updatePing(pingMs);
                        channel.unsubscribe('pong', handler);
                    }
                };

                channel.subscribe('pong', handler);

                setTimeout(() => {
                    channel.unsubscribe('pong', handler);
                    if (isFirstPing) {
                        isFirstPing = false;
                        updatePing(30);
                    }
                }, 2000);

            } catch (e) {
                if (isFirstPing) {
                    isFirstPing = false;
                    updatePing(30);
                }
            }
        }

        function setupPingListener() {
            if (!channel) return;

            channel.subscribe('ping', (message) => {
                if (message.data.clientId === currentUserId) return;
                channel.publish('pong', {
                    id: message.data.id,
                    clientId: currentUserId
                });
            });

            setInterval(measurePing, 3000);
            setTimeout(measurePing, 500);
        }

        // ============================================================
        // 5. LOGIN
        // ============================================================
        async function handleLogin() {
            const name = nameInput.value.trim();
            if (!name) {
                loginError.textContent = '⚠️ لطفاً نام خود را وارد کنید';
                return;
            }
            if (name.length < 2) {
                loginError.textContent = '⚠️ نام باید حداقل ۲ حرف باشد';
                return;
            }

            loginBtn.textContent = '⏳ در حال اتصال...';
            loginBtn.disabled = true;
            loginError.textContent = '';

            try {
                await connectToAbly(name);
                playerName = name;
                channel = ablyClient.channels.get('fight-arena');

                playerNameDisplay.textContent = `👤 ${playerName}`;
                loginScreen.classList.add('hidden');

                startGame();

            } catch (error) {
                loginError.textContent = '❌ ' + error.message;
                loginBtn.textContent = '🔥 وارد مبارزه شو';
                loginBtn.disabled = false;
            }
        }

        loginBtn.addEventListener('click', handleLogin);
        nameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // ============================================================
        // 6. THREE.JS SCENE
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 40);
        camera.position.set(0, 1.6, 3.0);

        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const cameraRadius = 3.0;
        const cameraHeight = 1.6;
        let cameraTheta = 0;
        let cameraPhi = 0.3;
        let targetCameraTheta = 0;
        let targetCameraPhi = 0.3;
        let playerTarget = new THREE.Vector3(0, 1.0, 0);

        const PHI_MIN = 0.1;
        const PHI_MAX = 0.8;

        function updateCamera() {
            cameraTheta += (targetCameraTheta - cameraTheta) * 0.15;
            cameraPhi += (targetCameraPhi - cameraPhi) * 0.15;
            cameraPhi = Math.max(PHI_MIN, Math.min(PHI_MAX, cameraPhi));

            const x = Math.sin(cameraTheta) * cameraRadius * Math.cos(cameraPhi);
            const y = Math.sin(cameraPhi) * cameraRadius + cameraHeight;
            const z = Math.cos(cameraTheta) * cameraRadius * Math.cos(cameraPhi);

            const targetPos = playerTarget.clone().add(new THREE.Vector3(x, y, z));

            camera.position.lerp(targetPos, 0.2);
            camera.lookAt(playerTarget);
        }

        // ============================================================
        const cameraControlArea = document.getElementById('camera-control-area');
        let isCameraDragging = false;
        let lastTouchX = 0;
        let lastTouchY = 0;
        let touchId = null;

        cameraControlArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            isCameraDragging = true;
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
            touchId = touch.identifier;
        }, { passive: false });

        cameraControlArea.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isCameraDragging) return;

            for (const touch of e.changedTouches) {
                if (touch.identifier === touchId) {
                    const deltaX = touch.clientX - lastTouchX;
                    const deltaY = touch.clientY - lastTouchY;
                    targetCameraTheta -= deltaX * 0.008;
                    targetCameraPhi += deltaY * 0.008;
                    targetCameraPhi = Math.max(PHI_MIN, Math.min(PHI_MAX, targetCameraPhi));
                    lastTouchX = touch.clientX;
                    lastTouchY = touch.clientY;
                    break;
                }
            }
        }, { passive: false });

        cameraControlArea.addEventListener('touchend', (e) => {
            for (const touch of e.changedTouches) {
                if (touch.identifier === touchId) {
                    isCameraDragging = false;
                    touchId = null;
                    break;
                }
            }
        }, { passive: true });

            lastMouseY = e.clientY;

            targetCameraPhi += deltaY * 0.006;
            targetCameraPhi = Math.max(PHI_MIN, Math.min(PHI_MAX, targetCameraPhi));
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

                    if (fingers[name]) {
                        let bendAmount = -0.6 - (i * 0.2);
                        if (group[0].includes('Thumb')) {
                            bendAmount = -0.3;
                            fingers[name].rotation.z = 0.2;

                    }

            }

                'mixamorigRightHandRing1', 'mixamorigRightHandRing2', 'mixamorigRightHandRing3',
                'mixamorigRightHandPinky1', 'mixamorigRightHandPinky2'
            ];
            
            for (const name of fingerNames) {
                if (fingers[name] && startFingerRotations[name]) {
                    fingers[name].rotation.x = startFingerRotations[name].x || 0;
                    fingers[name].rotation.y = startFingerRotations[name].y || 0;

        function updateMeleeAnimation(delta) {
            if (!punchAnimating) return;
            if (!rightArm || !rightForeArm) {
                punchAnimating = false;
                return;
            }

            punchProgress += delta / PUNCH_DURATION;

            // فاز 0: کشیدن به عقب (0 تا 0.25)
            if (punchPhase === 0) {
                if (punchProgress >= 0.25) {
                    punchPhase = 1;
                    punchProgress = 0;
                } else {
                    const t = punchProgress / 0.25;
                    const easeOut = 1 - Math.pow(1 - t, 2);
                    
                    if (rightShoulder) {
                        rightShoulder.rotation.x = startRotations.rightShoulder.x - 0.3 * easeOut;
                        rightShoulder.rotation.z = startRotations.rightShoulder.z + 0.15 * easeOut;
                    }
                    rightArm.rotation.x = startRotations.rightArm.x - 0.4 * easeOut;
                    if (spine1) {
                        spine1.rotation.x = startRotations.spine1.x + 0.1 * easeOut;
                    }
                }
            }
            // فاز 1: پرتاب به جلو - ضربه (0.25 تا 0.7)
            else if (punchPhase === 1) {
                if (punchProgress >= 0.45) {
                    punchPhase = 2;
                    punchProgress = 0;
                } else {
                    const t = punchProgress / 0.45;
                    const easeOut = 1 - Math.pow(1 - t, 3);
                    
                    if (rightShoulder) {
                        rightShoulder.rotation.x = startRotations.rightShoulder.x - 0.9 * easeOut;
                        rightShoulder.rotation.z = startRotations.rightShoulder.z - 0.2 * easeOut;
                    }
                    rightArm.rotation.x = startRotations.rightArm.x - 1.7 * easeOut;
                    rightArm.rotation.z = startRotations.rightArm.z - 0.2 * easeOut;
                    rightForeArm.rotation.x = startRotations.rightForeArm.x - 1.2 * easeOut;
                    
                    if (spine1) {
                        spine1.rotation.x = startRotations.spine1.x - 0.25 * easeOut;
                    }
                    if (spine2) {
                        spine2.rotation.x = startRotations.spine2.x - 0.2 * easeOut;
                    }
                }
            }
            // فاز 2: بازگشت (0.7 تا 1.0)
            else if (punchPhase === 2) {
                if (punchProgress >= 0.3) {
                    punchAnimating = false;
                    // بازگشت کامل
                    const bones = {
                        rightShoulder, rightArm, rightForeArm, rightHand,
                        spine1, spine2
                    };
                    for (const [key, bone] of Object.entries(bones)) {
                        if (bone && startRotations[key]) {
                            bone.rotation.x = startRotations[key].x;
                            bone.rotation.y = startRotations[key].y;
                            bone.rotation.z = startRotations[key].z;
                        }
                    }
                    openFingers(fingerBonesR);
                    if (idleAction && !isMoving) {
                        switchAnimation(idleAction);
                    }
                } else {
                    const t = punchProgress / 0.3;
                    const easeIn = t * t;
                    
                    if (rightShoulder) {
                        rightShoulder.rotation.x = startRotations.rightShoulder.x - 0.9 * (1 - easeIn);
                        rightShoulder.rotation.z = startRotations.rightShoulder.z - 0.2 * (1 - easeIn);
                    }
                    rightArm.rotation.x = startRotations.rightArm.x - 1.7 * (1 - easeIn);
                    rightArm.rotation.z = startRotations.rightArm.z - 0.2 * (1 - easeIn);
                    rightForeArm.rotation.x = startRotations.rightForeArm.x - 1.2 * (1 - easeIn);
                    if (spine1) {
                        spine1.rotation.x = startRotations.spine1.x - 0.25 * (1 - easeIn);
                    }
                    if (spine2) {
                        spine2.rotation.x = startRotations.spine2.x - 0.2 * (1 - easeIn);
                    }
                }
            }
        }

        function checkMeleeHit() {
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyQuaternion(characterGroup.quaternion);
            
            const punchOrigin = characterGroup.position.clone();
            punchOrigin.y += 1.2;
            punchOrigin.add(forward.clone().multiplyScalar(0.3));
            
            const raycaster = new THREE.Raycaster(punchOrigin, forward, 0.2, 2.0);
            
            const remoteMeshes = [];
            const meshToPlayer = {};
            for (const [id, remotePlayer] of players) {
                if (id === currentUserId) continue;
                remotePlayer.mesh.traverse((child) => {
                    if (child.isMesh) {
                        remoteMeshes.push(child);
                        meshToPlayer[child.uuid] = { id, name: remotePlayer.name };
                    }
                });
            }
            
            const intersects = raycaster.intersectObjects(remoteMeshes, false);
            
            if (intersects.length > 0) {
                const hitInfo = meshToPlayer[intersects[0].object.uuid];
                if (hitInfo) {
                    // Knock Back
                    const knockDir = new THREE.Vector3(0, 0, 1);
                    knockDir.applyQuaternion(characterGroup.quaternion);
                    const targetPlayer = players.get(hitInfo.id);
                    if (targetPlayer) {
                        targetPlayer.mesh.position.add(knockDir.multiplyScalar(0.5));
                    }
                    return {
                        id: hitInfo.id,
                        name: hitInfo.name,
                        point: intersects[0].point
                    };
                }
            }
            return null;
        }

        function createHitEffect(position) {

                particle.position.x += (Math.random() - 0.5) * 0.1;
                particle.position.y += (Math.random() - 0.5) * 0.1;
                particle.position.z += (Math.random() - 0.5) * 0.1;
                scene.add(particle);
                
                const dir = new THREE.Vector3(
                    (Math.random() - 0.5),
                    (Math.random() - 0.5),
                    (Math.random() - 0.5)
                ).normalize().multiplyScalar(0.5 + Math.random() * 1.0);
                
                const life = 300 + Math.random() * 400;
                const startTime = Date.now();
                
                const animateParticle = () => {
                    const elapsed = Date.now() - startTime;
                    if (elapsed > life) {
                        scene.remove(particle);
                        return;
                    }
                    const progress = elapsed / life;
                    particle.position.add(dir.clone().multiplyScalar(0.04));
                    particle.scale.setScalar(1 + progress * 2);
                    particle.material.opacity = 0.8 * (1 - progress);
                    requestAnimationFrame(animateParticle);
                };
                animateParticle();
            }
        }

                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(player);

                    const idleAnim = findAnimation(animations, ['idle', 'stand', 'wait']);

                    if (idleAnim) {

                    if (walkAnim) walkAction = mixer.clipAction(walkAnim);
                    if (runAnim) runAction = mixer.clipAction(runAnim);
                    if (!walkAnim && runAnim) walkAction = mixer.clipAction(runAnim);
                }

                setTimeout(() => {
                    if (channel) {
                        channel.presence.enter({
                            x: characterGroup.position.x,
                            z: characterGroup.position.z,
                            rotation: characterGroup.rotation.y,
                            name: playerName
                        });
                    }
                }, 500);

                startSendingPosition();
                setupPingListener();
            },
            undefined,
            function(error) {
                console.error('❌ خطا:', error);
                debugEl.textContent = `❌ خطا: ${error.message}`;
                debugEl.className = 'error';
            }
        );

        // ============================================================
        // 15. NETWORK
        // ============================================================
        function createRemotePlayer(clientId, data) {
            if (clientId === currentUserId) return;
            if (players.has(clientId)) return;

            const group = new THREE.Group();

            characterLoader.load(
                "https://rawcdn.githack.com/mrdoob/three.js/r170/examples/models/gltf/Soldier.glb",
                (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(1, 1, 1);
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            if (child.material) {
                                const hue = (parseInt(clientId.substr(-4), 36) % 360) / 360;
                                child.material.color.setHSL(hue, 0.4, 0.5);
                            }
                        }
                    });

                    group.add(model);

                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'player-label';
                    labelDiv.textContent = data.name || 'کاربر';
                    const label = new CSS2DObject(labelDiv);
                    label.position.set(0, 1.8, 0);
                    group.add(label);

                    group.position.set(data.x || 0, 0.1, data.z || 0);
                    group.rotation.y = data.rotation || 0;

                    scene.add(group);

                    players.set(clientId, {
                        mesh: group,
                        label: label,
                        data: data,
                        name: data.name || 'کاربر',
                        lastUpdate: Date.now(),
                        hit: false,
                        hitTime: 0
                    });

                    updateOnlineCount();
                },
                undefined,
                () => {
                    createSimpleRemotePlayer(clientId, data);
                }
            );
        }

        function createSimpleRemotePlayer(clientId, data) {
            const group = new THREE.Group();

            const bodyMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL((parseInt(clientId.substr(-4), 36) % 360) / 360, 0.4, 0.5),
                roughness: 0.3,
                metalness: 0.1,
            });
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1.0, 8, 12), bodyMat);
            body.position.y = 0.5;
            body.castShadow = true;
            group.add(body);

            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.4 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12, 12), headMat);
            head.position.y = 1.3;
            head.castShadow = true;
            group.add(head);

            const labelDiv = document.createElement('div');
            labelDiv.className = 'player-label';
            labelDiv.textContent = data.name || 'کاربر';
            const label = new CSS2DObject(labelDiv);
            label.position.set(0, 1.8, 0);
            group.add(label);

            group.position.set(data.x || 0, 0.1, data.z || 0);
            group.rotation.y = data.rotation || 0;

            scene.add(group);

            players.set(clientId, {
                mesh: group,
                label: label,
                data: data,
                name: data.name || 'کاربر',
                lastUpdate: Date.now(),
                hit: false,
                hitTime: 0
            });

            updateOnlineCount();
        }

        function updateRemotePlayer(clientId, data) {
            if (clientId === currentUserId) return;
            const player = players.get(clientId);
            if (!player) {
                createRemotePlayer(clientId, data);
                return;
            }

            player.mesh.position.x = data.x || 0;
            player.mesh.position.z = data.z || 0;
            player.mesh.rotation.y = data.rotation || 0;

            if (player.label) {
                player.label.element.textContent = data.name || 'کاربر';
            }

            player.data = data;
            player.lastUpdate = Date.now();
        }

        function removeRemotePlayer(clientId) {
            if (clientId === currentUserId) return;
            const player = players.get(clientId);
            if (player) {
                scene.remove(player.mesh);
                players.delete(clientId);
                updateOnlineCount();
            }
        }

        function updateOnlineCount() {
            const count = players.size + 1;
            onlineCountDisplay.textContent = `👥 ${count} آنلاین`;
        }

        // ============================================================
        // 16. NETWORK SEND/RECEIVE
        // ============================================================
        let sendInterval = null;

        function startSendingPosition() {
            if (sendInterval) clearInterval(sendInterval);

            sendInterval = setInterval(() => {
                if (!isConnected || !channel || !player) return;

                const pos = characterGroup.position;
                const data = {
                    x: pos.x,
                    z: pos.z,
                    rotation: characterGroup.rotation.y,
                    name: playerName,
                    timestamp: Date.now()
                };

                try {
                    channel.publish('player-update', {
                        clientId: currentUserId,
                        ...data
                    });
                } catch (e) {}
            }, SEND_INTERVAL);
        }

        function setupChannelListener() {
            if (!channel) return;

            channel.subscribe('player-update', (message) => {
                const data = message.data;
                if (data.clientId === currentUserId) return;
                updateRemotePlayer(data.clientId, data);
            });

            channel.subscribe('melee', (message) => {
                const data = message.data;
                if (data.target === currentUserId) {
                    stats.deaths++;
                    updateStats();
                    debugEl.textContent = `💀 ${data.fromName} شما را کشت!`;
                    debugEl.className = 'error';
                    setTimeout(() => {
                        debugEl.textContent = '✅ آماده مبارزه';
                        debugEl.className = '';
                    }, 2000);
                    cameraShake = 0.15;
                }
            });

            channel.presence.subscribe('enter', (presence) => {
                if (presence.clientId === currentUserId) return;
                if (presence.data) {
                    createRemotePlayer(presence.clientId, presence.data);
                }
            });

            channel.presence.subscribe('leave', (presence) => {
                removeRemotePlayer(presence.clientId);
            });

            channel.presence.get((err, members) => {
                if (err) {
                    console.error('خطا در دریافت اعضا:', err);
                    return;
                }
                members.forEach((member) => {
                    if (member.clientId !== currentUserId && member.data) {
                        createRemotePlayer(member.clientId, member.data);
                    }
                });
                updateOnlineCount();
            });

            setTimeout(() => {
                if (channel && player) {
                    channel.presence.enter({
                        x: characterGroup.position.x,
                        z: characterGroup.position.z,
                        rotation: characterGroup.rotation.y,
                        name: playerName
                    });
                }
            }, 1000);
        }

        // ============================================================
        // 17. CONTROLS
        // ============================================================
        function setupButton(id, moveKey) {
            const btn = document.getElementById(id);
            if (!btn) return;

            const start = (e) => {
                e.preventDefault();
                moveState[moveKey] = true;
                btn.classList.add('active');
            };

            const end = (e) => {
                e.preventDefault();
                moveState[moveKey] = false;
                btn.classList.remove('active');
            };

            btn.addEventListener('touchstart', start, { passive: false });
            btn.addEventListener('touchend', end, { passive: false });
            btn.addEventListener('touchcancel', end, { passive: false });
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', end);
            btn.addEventListener('mouseleave', end);
        }

        setupButton('btnForward', 'forward');
        setupButton('btnBack', 'back');
        setupButton('btnLeft', 'left');
        setupButton('btnRight', 'right');

        // ============================================================
        // 18. PUNCH BUTTON
        // ============================================================
        const punchBtn = document.getElementById('punch-btn');

        punchBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startMeleePunch();
        }, { passive: false });

        punchBtn.addEventListener('click', () => {
            startMeleePunch();
        });

        window.startMeleePunch = startMeleePunch;

        // ============================================================
        // 19. MOVEMENT
        // ============================================================
        let velocity = new THREE.Vector3(0, 0, 0);
        const maxSpeed = 3.5;
        const acceleration = 8;
        const deceleration = 6;

        function updateMovement(delta) {
            if (!player || !playerLoaded) return;

            const rotSpeed = 2.5;
            let moving = false;
            let isRunning = false;

            if (moveState.left || moveState.right || moveState.forward || moveState.back) {
                moving = true;
            }
            if (moveState.forward && (moveState.left || moveState.right)) {
                isRunning = true;
            }

            if (moveState.left) {
                characterGroup.rotation.y += delta * rotSpeed;
            }
            if (moveState.right) {
                characterGroup.rotation.y -= delta * rotSpeed;
            }

            const dir = new THREE.Vector3(0, 0, -1);
            dir.applyQuaternion(characterGroup.quaternion);

            const targetSpeed = moving ? (isRunning ? maxSpeed * 1.3 : maxSpeed) : 0;
            const currentSpeed = velocity.length();

            if (moving) {
                const accel = acceleration * delta;
                velocity.x += dir.x * accel;
                velocity.z += dir.z * accel;
                const newSpeed = Math.min(velocity.length(), targetSpeed);
                velocity.normalize().multiplyScalar(newSpeed);
            } else {
                const decel = deceleration * delta;
                const newSpeed = Math.max(0, currentSpeed - decel);
                if (newSpeed < 0.01) {
                    velocity.set(0, 0, 0);
                } else {
                    velocity.normalize().multiplyScalar(newSpeed);
                }
            }

            const newPos = characterGroup.position.clone();
            newPos.x += velocity.x * delta;
            newPos.z += velocity.z * delta;

            if (!checkCollision(newPos)) {
                characterGroup.position.x = newPos.x;
                characterGroup.position.z = newPos.z;
            } else {
                velocity.set(0, 0, 0);
            }

            if (mixer) {
                mixer.update(delta);

                if (moving) {
                    if (isRunning && runAction) {
                        switchAnimation(runAction);
                    } else if (walkAction) {
                        switchAnimation(walkAction);
                    } else if (runAction) {
                        switchAnimation(runAction);
                    }
                } else {
                    if (idleAction && !punchAnimating) {
                        switchAnimation(idleAction);
                    }
                }
            }

            if (moving && velocity.length() > 0.5) {
                walkCycle += delta * 5;
                const swing = Math.sin(walkCycle) * 0.015;
                characterGroup.rotation.z = swing;
                characterGroup.position.y = Math.abs(Math.sin(walkCycle * 0.5)) * 0.005;

                isMoving = true;
                const statusText = isRunning ? '🏃 <span>دویدن</span>' : '🚶 <span>راه رفتن</span>';
                document.getElementById('status').innerHTML = statusText + ' | ' +
                    (moveState.forward ? 'جلو ' : '') +
                    (moveState.back ? 'عقب ' : '') +
                    (moveState.left ? 'چپ ' : '') +
                    (moveState.right ? 'راست' : '');
            } else {
                if (isMoving) {
                    characterGroup.rotation.z = 0;
                    characterGroup.position.y = 0;
                    isMoving = false;
                    document.getElementById('status').innerHTML = '🎮 <span>نقشه جنگی</span> | آماده ✅';
                }
            }

            localLabel.position.set(0, 1.8, 0);

            if (player) {
                playerTarget.copy(characterGroup.position);
                playerTarget.y += 1.0;
            }

            if (punchCooldown > 0) punchCooldown -= delta;

            if (cameraShake > 0) {
                cameraShake *= 0.9;
                if (cameraShake < 0.001) cameraShake = 0;
            }

            updateMeleeAnimation(delta);
        }

        // ============================================================
        // 20. COLLISION
        // ============================================================
        const PLAYER_RADIUS = 0.35;

        function checkCollision(newPos) {
            const playerPos = new THREE.Vector3(newPos.x, 0, newPos.z);

            for (const obs of obstacles) {
                if (obs.type === 'box') {
                    const half = obs.size.clone().multiplyScalar(0.5);
                    const obsPos = obs.pos.clone();

                    const dx = Math.abs(playerPos.x - obsPos.x);
                    const dz = Math.abs(playerPos.z - obsPos.z);

                    if (dx < half.x + PLAYER_RADIUS && dz < half.z + PLAYER_RADIUS) {
                        return true;
                    }
                }
            }

            const limit = 10.5;
            if (Math.abs(newPos.x) > limit || Math.abs(newPos.z) > limit) {
                return true;
            }

            return false;
        }

        // ============================================================
        // 21. GAME LOOP
        // ============================================================
        let clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.05);
            updateMovement(delta);
            updateCamera();

            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        // ============================================================
        // 22. START GAME
        // ============================================================
        function startGame() {
            animate();

            setTimeout(() => {
                setupChannelListener();
            }, 1000);

            setInterval(() => {
                if (!isConnected && ablyClient) {
                    try {
                        if (typeof ablyClient.connection.recover === 'function') {
                            ablyClient.connection.recover();
                        } else {
                            ablyClient.connection.connect();
                        }
                    } catch (e) {
                        try {
                            ablyClient.connection.connect();
                        } catch (e2) {}
                    }
                }
            }, 3000);

            setInterval(() => {
                const now = Date.now();
                for (const [id, player] of players) {
                    if (now - player.lastUpdate > 5000) {
                        removeRemotePlayer(id);
                    }
                }
            }, 3000);
        }

        // ============================================================
        // 23. RESIZE
        // ============================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.addEventListener('touchmove', (e) => {
            if (e.target.closest('#controls') || e.target.closest('#action-buttons')) {
                e.preventDefault();
            }
        }, { passive: false });

        console.log('✅ بازی با سیستم Melee حرفه‌ای، Ping و Stats آماده است!');
        console.log('👊 مشت با بستن انگشتان و پرتاب به جلو');
        console.log('📡 Ping به صورت زنده نمایش داده میشود');
        console.log('🏆 آمار Kills, Deaths, K/D و Hits ثبت میشود');
    </script>
</body>
</html>
