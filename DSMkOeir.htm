<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Call of Duty - Lobby</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    user-select: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    top: 0;
    left: 0;
    background: #000;
}

body {
    color: #fff;
    background: #000 url('https://cdn.imgurl.ir/uploads/y16139_IMG_20260618_101758_062.jpg') no-repeat center center;
    background-size: cover;
    background-attachment: fixed;
}

/* === OVERLAY با گرادیان حرفه‌ای === */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 60%, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
    z-index: 0;
    pointer-events: none;
}

/* === همه المان‌ها === */
.topbar, .logo, .left-menu, .right-menu, .bottom-menu, .play-btn, .home-btn {
    position: fixed;
    z-index: 2;
}

/* ===== TOP BAR با بهبود گرافیک ===== */
.topbar {
    top: 0;
    right: 0;
    width: 100%;
    height: 52px;
    background: rgba(8, 8, 8, 0.85);
    backdrop-filter: blur(16px) saturate(200%);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 14px;
    border-bottom: 2px solid rgba(255, 180, 0, 0.6);
    box-shadow: 0 6px 28px rgba(0, 0, 0, 0.8);
    z-index: 10;
}

.profile {
    display: flex;
    align-items: center;
    gap: 8px;
}

.profile img {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2px solid #ffb300;
    box-shadow: 0 0 20px rgba(255, 180, 0, 0.25);
}

.player-info {
    font-size: 11px;
    line-height: 1.4;
    font-weight: 600;
}

.player-info div:first-child {
    color: #ffd966;
    letter-spacing: 0.5px;
    text-shadow: 0 0 12px rgba(255, 180, 0, 0.2);
}

.currency {
    display: flex;
    gap: 6px;
}

.currency-box {
    height: 26px;
    padding: 0 12px;
    background: rgba(255, 180, 0, 0.1);
    border: 1px solid rgba(255, 180, 0, 0.4);
    border-radius: 30px;
    display: flex;
    align-items: center;
    font-size: 11px;
    font-weight: 700;
    color: #ffd966;
    text-shadow: 0 0 14px rgba(255, 180, 0, 0.15);
    backdrop-filter: blur(4px);
}

/* ===== LOGO ===== */
.logo {
    top: 62px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
}

.logo img {
    height: 36px;
    filter: drop-shadow(0 6px 20px rgba(255, 180, 0, 0.35));
}

/* ===== LEFT MENU ===== */
.left-menu {
    top: 110px;
    left: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 3;
}

.left-btn {
    width: 42px;
    height: 42px;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 180, 0, 0.4);
    border-radius: 12px;
    cursor: pointer;
    overflow: hidden;
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
}

.left-btn:hover {
    transform: scale(1.08) translateX(4px);
    border-color: #ffb300;
    box-shadow: 0 8px 28px rgba(255, 180, 0, 0.25);
}

.left-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ===== RIGHT MENU ===== */
.right-menu {
    top: 110px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 3;
}

.right-btn {
    width: 42px;
    height: 42px;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 180, 0, 0.4);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
}

.right-btn:hover {
    transform: scale(1.08) translateX(-4px);
    border-color: #ffb300;
    box-shadow: 0 8px 28px rgba(255, 180, 0, 0.25);
}

.right-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ===== BOTTOM MENU با گرافیک بهتر ===== */
.bottom-menu {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 5;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(16px) saturate(180%);
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255, 180, 0, 0.2);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
}

.bottom-btn {
    width: 52px;
    height: 52px;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(8px);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255, 180, 0, 0.3);
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
}

.bottom-btn:hover {
    border-color: #ffcc00;
    transform: scale(1.08) translateY(-4px);
    box-shadow: 0 12px 32px rgba(255, 180, 0, 0.2);
    background: rgba(255, 180, 0, 0.1);
}

.bottom-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.3));
}

/* ===== دکمه خانه (پایین وسط) - بدون دایره ===== */
.home-btn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 60px;
    /* حذف border-radius: 50% و border دایره‌ای */
    border-radius: 16px;
    border: none;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    cursor: pointer;
    overflow: hidden;
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 6;
    padding: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.home-btn img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 12px rgba(255, 180, 0, 0.2));
}

.home-btn:hover {
    transform: translateX(-50%) scale(1.06);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
    background: rgba(255, 180, 0, 0.1);
}

.home-btn:active {
    transform: translateX(-50%) scale(0.95);
}

/* ===== PLAY BUTTON ===== */
.play-btn {
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 190px;
    height: 54px;
    border: none;
    border-radius: 16px;
    padding: 0;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 10;
    background: transparent;
}

.play-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 16px;
    filter: none;
    transition: 0.3s;
}

.play-btn:hover {
    transform: translateX(-50%) scale(1.04) translateY(-4px);
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.7);
}

.play-btn:active {
    transform: translateX(-50%) scale(0.96);
}

/* ===== LANDSCAPE MODE ===== */
@media (orientation: landscape) {
    body {
        background: #000 url('https://cdn.imgurl.ir/uploads/y16139_IMG_20260618_101758_062.jpg') no-repeat center center !important;
        background-size: cover !important;
        background-attachment: fixed !important;
    }
    
    .topbar {
        height: 44px;
        padding: 0 10px;
    }
    
    .profile img {
        width: 28px;
        height: 28px;
    }
    
    .player-info {
        font-size: 10px;
    }
    
    .currency-box {
        height: 22px;
        font-size: 10px;
        padding: 0 10px;
    }
    
    .logo {
        top: 52px;
    }
    
    .logo img {
        height: 28px;
    }
    
    .left-menu, .right-menu {
        top: 86px;
        gap: 6px;
    }
    
    .left-btn, .right-btn {
        width: 36px;
        height: 36px;
    }
    
    .bottom-menu {
        bottom: 16px;
        padding: 6px 12px;
        gap: 8px;
    }
    
    .bottom-btn {
        width: 44px;
        height: 44px;
    }
    
    .home-btn {
        bottom: 22px;
        width: 52px;
        height: 52px;
        border-radius: 14px;
    }
    
    .play-btn {
        bottom: 80px;
        width: 160px;
        height: 46px;
    }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 500px) {
    .topbar { padding: 0 8px; height: 44px; }
    .profile img { width: 28px; height: 28px; }
    .player-info { font-size: 10px; }
    .currency-box { font-size: 10px; height: 22px; padding: 0 10px; }
    .logo img { height: 28px; }
    .left-btn, .right-btn { width: 36px; height: 36px; }
    .bottom-menu { padding: 5px 10px; gap: 6px; }
    .bottom-btn { width: 42px; height: 42px; }
    .home-btn { width: 52px; height: 52px; bottom: 28px; border-radius: 14px; }
    .play-btn { width: 160px; height: 46px; bottom: 86px; }
    .left-menu, .right-menu { top: 94px; gap: 6px; }
    .logo { top: 52px; }
}
</style>
</head>
<body>

<!-- ===== TOP BAR ===== -->
<div class="topbar">
    <div class="profile">
        <img src="PROFILE.png" alt="Profile">
        <div class="player-info">
            <div>PLAYER</div>
            <div>Lv.55</div>
        </div>
    </div>
    <div class="currency">
        <div class="currency-box">💰 5000</div>
        <div class="currency-box">💎 200</div>
    </div>
</div>

<!-- ===== LOGO ===== -->
<div class="logo">
    <img src="LOGO.png" alt="Logo">
</div>

<!-- ===== LEFT MENU ===== -->
<div class="left-menu">
    <div class="left-btn"><img src="SHOP.png" alt="Shop"></div>
    <div class="left-btn"><img src="CLAN.png" alt="Clan"></div>
    <div class="left-btn"><img src="MISSION.png" alt="Mission"></div>
</div>

<!-- ===== RIGHT MENU ===== -->
<div class="right-menu">
    <div class="right-btn"><img src="MAIL.png" alt="Mail"></div>
    <div class="right-btn"><img src="RANK.png" alt="Rank"></div>
    <div class="right-btn" onclick="openSettings()" style="border-color: #ffb300; background: rgba(255,180,0,0.15);">
        <img src="https://cdn.imgurl.ir/uploads/e923788_BackgroundEraser__.png" alt="Settings" style="filter: drop-shadow(0 0 8px rgba(255,180,0,0.4));">
    </div>
    <div class="right-btn"><img src="NEWS.png" alt="News"></div>
</div>

<!-- ===== BOTTOM MENU ===== -->
<div class="bottom-menu">
    <div class="bottom-btn" onclick="openShop()">
        <img src="https://uploadkon.ir/uploads/f3b118_26IMG-20260618-120340-044.jpg" alt="Shop">
    </div>
    <div class="bottom-btn"><img src="WEAPON.png" alt="Weapon"></div>
    <div class="bottom-btn"><img src="BATTLEPASS.png" alt="Battle Pass"></div>
    <div class="bottom-btn"><img src="INVENTORY.png" alt="Inventory"></div>
</div>

<!-- ===== دکمه خانه (پایین وسط - بدون دایره) ===== -->
<button class="home-btn" onclick="goHome()">
    <img src="https://uploadkon.ir/uploads/616a18_26IMG-20260618-182201-484.jpg" alt="Home">
</button>

<!-- ===== PLAY BUTTON ===== -->
<button class="play-btn" onclick="playGame()">
    <img src="https://uploadkon.ir/uploads/34f918_26IMG-20260618-114710-730.jpg" alt="شروع بازی">
</button>

<script>
// ===== پخش موسیقی پس‌زمینه =====
let bgMusic = null;
let isMusicPlaying = false;

function initMusic() {
    try {
        bgMusic = new Audio('https://uploadkon.ir/uploads/750a18_26Alexander-Nakarada-Chase.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.5;
        bgMusic.preload = 'auto';
        
        document.addEventListener('click', startMusic, { once: true });
        document.addEventListener('touchstart', startMusic, { once: true });
        
        bgMusic.addEventListener('canplaythrough', function() {
            console.log('موسیقی آماده پخش است');
        });
        
        bgMusic.addEventListener('error', function(e) {
            console.log('خطا در پخش موسیقی:', e);
        });
        
    } catch (e) {
        console.log('خطا در راه‌اندازی موسیقی:', e);
    }
}

function startMusic() {
    if (bgMusic && !isMusicPlaying) {
        bgMusic.play().then(() => {
            isMusicPlaying = true;
            console.log('موسیقی شروع شد');
        }).catch(err => {
            console.log('شروع موسیقی با خطا مواجه شد:', err);
            document.addEventListener('click', retryPlay, { once: true });
        });
    }
}

function retryPlay() {
    if (bgMusic && !isMusicPlaying) {
        bgMusic.play().then(() => {
            isMusicPlaying = true;
        }).catch(err => console.log('تلاش مجدد ناموفق:', err));
    }
}

initMusic();

// ===== توابع =====
function playGame() {
    alert('شروع بازی کالاف دیوتی!');
}

function openSettings() {
    alert('باز کردن تنظیمات');
}

function openShop() {
    alert('باز کردن فروشگاه');
}

function goHome() {
    alert('بازگشت به صفحه اصلی');
}

// ===== مدیریت تغییر جهت صفحه =====
window.addEventListener('orientationchange', function() {
    document.body.style.background = '#000 url("https://cdn.imgurl.ir/uploads/y16139_IMG_20260618_101758_062.jpg") no-repeat center center';
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundAttachment = 'fixed';
});

window.addEventListener('load', function() {
    document.body.style.background = '#000 url("https://cdn.imgurl.ir/uploads/y16139_IMG_20260618_101758_062.jpg") no-repeat center center';
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundAttachment = 'fixed';
});

// ===== کنترل موسیقی با تغییر تب =====
document.addEventListener('visibilitychange', function() {
    if (document.hidden && bgMusic) {
        bgMusic.pause();
    } else if (!document.hidden && bgMusic && isMusicPlaying) {
        bgMusic.play().catch(() => {});
    }
});
</script>

</body>
</html>
