<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سینما آنلاین - اشتراک فیلم و چت</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(45deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-status {
            background: #1e1e2f;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid #444;
        }

        .user-status span {
            color: #4caf50;
            font-weight: bold;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 25px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .video-section {
            background: #181825;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #0a0a12;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #videoPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            border: none;
        }

        .video-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .video-controls input {
            flex: 1;
            min-width: 200px;
            padding: 12px 18px;
            border-radius: 30px;
            border: 1px solid #333;
            background: #12121f;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .video-controls input:focus {
            border-color: #f7971e;
            box-shadow: 0 0 15px rgba(247, 151, 30, 0.2);
        }

        .video-controls button {
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(45deg, #f7971e, #ffd200);
            color: #1a1a2e;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .video-controls button:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(247, 151, 30, 0.4);
        }

        .video-controls button.secondary {
            background: #2a2a40;
            color: #ddd;
        }

        .video-controls button.secondary:hover {
            background: #3a3a55;
        }

        .current-movie {
            padding: 10px 0;
            font-size: 14px;
            color: #aaa;
            border-top: 1px solid #2a2a3e;
            margin-top: 5px;
        }

        .current-movie strong {
            color: #ffd700;
        }

        .chat-section {
            background: #181825;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: fit-content;
            max-height: 700px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a2a3e;
            margin-bottom: 15px;
        }

        .chat-header h3 {
            font-size: 18px;
            font-weight: 500;
        }

        .chat-header .badge {
            background: #4caf50;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 12px;
            color: #fff;
        }

        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 5px 0;
            margin-bottom: 15px;
            max-height: 450px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #chatMessages::-webkit-scrollbar {
            width: 5px;
        }

        #chatMessages::-webkit-scrollbar-track {
            background: #1a1a2e;
            border-radius: 10px;
        }

        #chatMessages::-webkit-scrollbar-thumb {
            background: #f7971e;
            border-radius: 10px;
        }

        .message {
            padding: 8px 14px;
            border-radius: 18px;
            background: #26263a;
            max-width: 90%;
            word-break: break-word;
            font-size: 14px;
            line-height: 1.5;
            align-self: flex-start;
        }

        .message.own {
            background: #f7971e;
            color: #0f0f1a;
            align-self: flex-end;
        }

        .message .msg-user {
            font-weight: 600;
            font-size: 12px;
            opacity: 0.7;
            display: block;
            margin-bottom: 2px;
        }

        .chat-input {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #333;
            background: #12121f;
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        .chat-input input:focus {
            border-color: #f7971e;
        }

        .chat-input button {
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            background: #f7971e;
            color: #1a1a2e;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .chat-input button:hover {
            background: #ffd200;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #555;
            border-top: 1px solid #1e1e30;
            padding-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #ffd700;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading" id="loadingMessage">⏳ در حال اتصال به سرور...</div>
        
        <!-- محتوای اصلی که در ابتدا مخفی است -->
        <div id="mainContent" style="display: none;">
            <div class="header">
                <div class="logo">🎬 سینما آنلاین</div>
                <div class="user-status">👤 <span id="userNameDisplay">کاربر</span> · آنلاین</div>
            </div>

            <div class="main-grid">
                <div class="video-section">
                    <div class="video-wrapper">
                        <video id="videoPlayer" controls autoplay playsinline>
                            <source src="" type="video/mp4">
                            مرورگر شما از پخش ویدئو پشتیبانی نمی‌کند.
                        </video>
                    </div>

                    <div class="video-controls">
                        <input type="text" id="videoUrlInput" placeholder="لینک فیلم را وارد کنید (mp4, m3u8, ...)" />
                        <button id="playBtn">▶️ پخش</button>
                        <button id="shareBtn" class="secondary">📤 اشتراک برای همه</button>
                    </div>

                    <div class="current-movie">
                        🎥 در حال پخش: <strong id="currentMovieTitle">هیچ فیلمی انتخاب نشده</strong>
                    </div>
                </div>

                <div class="chat-section">
                    <div class="chat-header">
                        <h3>💬 چت زنده</h3>
                        <span class="badge" id="onlineCount">● ۰ آنلاین</span>
                    </div>
                    <div id="chatMessages">
                        <div class="message"><span class="msg-user">سیستم</span>در حال اتصال به سرور...</div>
                    </div>
                    <div class="chat-input">
                        <input type="text" id="chatInput" placeholder="پیام خود را بنویسید..." disabled />
                        <button id="sendChatBtn" disabled>➤</button>
                    </div>
                </div>
            </div>

            <div class="footer">
                🔗 متصل به سرور Ably · تمامی ارتباطات به صورت زنده و رمزگذاری شده
            </div>
        </div>
    </div>

    <script>
        // ======  صبر می‌کنیم تا صفحه کامل بارگذاری شود  ======
        window.addEventListener('load', function() {
            // ======  بررسی وجود Ably  ======
            if (typeof Ably === 'undefined') {
                document.getElementById('loadingMessage').innerHTML = '❌ خطا: کتابخانه Ably بارگذاری نشد. اینترنت خود را بررسی کنید.';
                console.error('Ably not loaded!');
                return;
            }

            // ======  نمایش محتوای اصلی و مخفی کردن لودینگ  ======
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';

            // ======  CONFIG  ======
            const ABLY_API_KEY = 'NNYzzQ.7HHPYg:NA1mSMcWdEnlWOHGZ4CaF7ZUkoXe1Iggtf0sy-nNsDM';
            const CHANNEL_NAME = 'cinema-live';

            // ======  DOM refs  ======
            const videoPlayer = document.getElementById('videoPlayer');
            const videoUrlInput = document.getElementById('videoUrlInput');
            const playBtn = document.getElementById('playBtn');
            const shareBtn = document.getElementById('shareBtn');
            const currentMovieTitle = document.getElementById('currentMovieTitle');

            const chatMessages = document.getElementById('chatMessages');
            const chatInput = document.getElementById('chatInput');
            const sendChatBtn = document.getElementById('sendChatBtn');
            const userNameDisplay = document.getElementById('userNameDisplay');
            const onlineCount = document.getElementById('onlineCount');

            // ======  STATE  ======
            let ably = null;
            let channel = null;
            let currentUser = 'کاربر_' + Math.floor(Math.random() * 10000);
            let isConnected = false;

            // ======  فعال/غیرفعال کردن چت  ======
            function setChatEnabled(enabled) {
                chatInput.disabled = !enabled;
                sendChatBtn.disabled = !enabled;
                if (enabled) {
                    chatInput.placeholder = 'پیام خود را بنویسید...';
                } else {
                    chatInput.placeholder = 'در حال اتصال...';
                }
            }

            // ======  INIT Ably  ======
            function initAbly() {
                try {
                    ably = new Ably.Realtime(ABLY_API_KEY);
                    channel = ably.channels.get(CHANNEL_NAME);

                    // نمایش نام کاربر
                    userNameDisplay.textContent = currentUser;

                    // ======  دریافت پیام‌های چت  ======
                    channel.subscribe('chat', function(message) {
                        const data = message.data;
                        if (!data) return;
                        appendMessage(data.user, data.text, data.user === currentUser);
                    });

                    // ======  دریافت لینک فیلم  ======
                    channel.subscribe('video', function(message) {
                        const data = message.data;
                        if (!data || !data.url) return;
                        playVideo(data.url, data.title || 'فیلم اشتراکی');
                        appendMessage('سیستم', `📽️ فیلم جدید: ${data.title || 'بدون عنوان'}`, false);
                    });

                    // ======  تعداد آنلاین‌ها (Presence)  ======
                    channel.presence.subscribe('enter', function(member) {
                        updateOnlineCount();
                    });
                    channel.presence.subscribe('leave', function(member) {
                        updateOnlineCount();
                    });
                    channel.presence.subscribe('update', function(member) {
                        updateOnlineCount();
                    });

                    // وارد کردن خود به حضور
                    channel.presence.enter({ name: currentUser }, function(err) {
                        if (err) {
                            console.warn('Presence enter error:', err);
                        } else {
                            isConnected = true;
                            setChatEnabled(true);
                            appendMessage('سیستم', '✅ به سرور متصل شدید!', false);
                        }
                    });

                    // بروزرسانی اولیه تعداد
                    setTimeout(updateOnlineCount, 500);

                    console.log('✅ Ably متصل شد');
                } catch (e) {
                    console.error('❌ خطا در اتصال Ably:', e);
                    document.getElementById('loadingMessage').style.display = 'block';
                    document.getElementById('loadingMessage').innerHTML = '❌ خطا در اتصال به سرور. صفحه را مجدد بارگذاری کنید.';
                    document.getElementById('mainContent').style.display = 'none';
                }
            }

            // ======  بروزرسانی تعداد آنلاین  ======
            function updateOnlineCount() {
                if (!channel) return;
                channel.presence.get(function(err, members) {
                    if (err) {
                        console.warn('Presence get error:', err);
                        return;
                    }
                    const count = members ? members.length : 0;
                    onlineCount.textContent = `● ${count} آنلاین`;
                });
            }

            // ======  افزودن پیام به چت  ======
            function appendMessage(user, text, isOwn = false) {
                const div = document.createElement('div');
                div.className = 'message' + (isOwn ? ' own' : '');
                const userSpan = document.createElement('span');
                userSpan.className = 'msg-user';
                userSpan.textContent = user;
                div.appendChild(userSpan);
                const textNode = document.createTextNode(text);
                div.appendChild(textNode);
                chatMessages.appendChild(div);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            // ======  پخش فیلم  ======
            function playVideo(url, title = 'فیلم') {
                if (!url) return;
                videoPlayer.src = url;
                videoPlayer.load();
                videoPlayer.play().catch(e => console.warn('Auto-play prevented:', e));
                currentMovieTitle.textContent = title || 'بدون عنوان';
                localStorage.setItem('lastVideoUrl', url);
                localStorage.setItem('lastVideoTitle', title || '');
            }

            // ======  اشتراک لینک فیلم برای همه  ======
            function shareVideo(url, title) {
                if (!url) {
                    alert('لطفا ابتدا یک لینک وارد کنید.');
                    return;
                }
                if (!channel || !isConnected) {
                    alert('اتصال به سرور برقرار نیست.');
                    return;
                }
                channel.publish('video', {
                    url: url,
                    title: title || 'فیلم اشتراکی',
                    sharedBy: currentUser
                }, function(err) {
                    if (err) {
                        console.error('Publish error:', err);
                        alert('خطا در اشتراک فیلم. دوباره تلاش کنید.');
                    } else {
                        appendMessage('شما', `📤 فیلم "${title || 'بدون عنوان'}" را برای همه به اشتراک گذاشتید.`, true);
                        playVideo(url, title);
                    }
                });
            }

            // ======  ارسال پیام چت  ======
            function sendChatMessage(text) {
                if (!text.trim()) return;
                if (!channel || !isConnected) {
                    alert('اتصال به سرور برقرار نیست.');
                    return;
                }
                channel.publish('chat', {
                    user: currentUser,
                    text: text.trim()
                }, function(err) {
                    if (err) {
                        console.error('Chat publish error:', err);
                        alert('خطا در ارسال پیام.');
                    }
                });
                appendMessage(currentUser, text.trim(), true);
                chatInput.value = '';
                chatInput.focus();
            }

            // ======  EVENT LISTENERS  ======

            playBtn.addEventListener('click', function() {
                const url = videoUrlInput.value.trim();
                if (!url) {
                    alert('لطفا لینک فیلم را وارد کنید.');
                    return;
                }
                const title = prompt('عنوان فیلم را وارد کنید (اختیاری):', 'فیلم من') || 'فیلم';
                playVideo(url, title);
                localStorage.setItem('lastVideoUrl', url);
                localStorage.setItem('lastVideoTitle', title);
            });

            shareBtn.addEventListener('click', function() {
                const url = videoUrlInput.value.trim();
                if (!url) {
                    alert('لطفا لینک فیلم را در کادر بالا وارد کنید.');
                    return;
                }
                const title = prompt('عنوان فیلم را برای دیگران مشخص کنید:', 'فیلم اشتراکی') || 'فیلم اشتراکی';
                shareVideo(url, title);
            });

            sendChatBtn.addEventListener('click', function() {
                sendChatMessage(chatInput.value);
            });

            chatInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendChatMessage(chatInput.value);
                }
            });

            // ======  بازیابی آخرین فیلم از localStorage  ======
            function loadLastVideo() {
                const lastUrl = localStorage.getItem('lastVideoUrl');
                const lastTitle = localStorage.getItem('lastVideoTitle');
                if (lastUrl) {
                    videoUrlInput.value = lastUrl;
                    playVideo(lastUrl, lastTitle || 'آخرین فیلم');
                }
            }

            // ======  START  ======
            initAbly();
            loadLastVideo();

            // ======  خروج ایمن (cleanup)  ======
            window.addEventListener('beforeunload', function() {
                if (channel && channel.presence) {
                    channel.presence.leave();
                }
                if (ably) {
                    ably.close();
                }
            });
        });
    </script>
</body>
</html>
